<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Guide — blue team field manual</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#030711;
    --bg2:#0a1020;
    --bg3:#0f1a30;
    --bg4:#162240;
    --border:rgba(0,200,255,.08);
    --text:#dce5f0;
    --text2:#6b7fa0;
    --cyan:#00c8ff;
    --blue:#3b82f6;
    --green:#22c55e;
    --yellow:#eab308;
    --red:#ef4444;
    --purple:#a855f7;
    --orange:#f97316;
    --side:250px;
    --font:'Inter','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  html{font-size:14.5px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background:
      linear-gradient(rgba(0,200,255,.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,255,.02) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;
    background:linear-gradient(180deg,rgba(0,200,255,.015) 0%,transparent 30%,transparent 70%,rgba(0,200,255,.015) 100%);
    pointer-events:none;z-index:0}
  #root{display:flex;min-height:100vh;position:relative;z-index:1}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(0,200,255,.15);border-radius:2px}
  ::selection{background:rgba(0,200,255,.2);color:var(--text)}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--side);
    background:linear-gradient(180deg,rgba(10,16,32,.97),rgba(3,7,17,.97));
    border-right:1px solid var(--border);overflow-y:auto;z-index:100;
    transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .side-hdr{padding:0;position:sticky;top:0;z-index:2}
  .side-hdr-inner{background:linear-gradient(135deg,rgba(0,200,255,.06),rgba(168,85,247,.04));
    padding:22px 18px 16px;border-bottom:1px solid var(--border);
    clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),0 100%)}
  .side-hdr h1{font-size:.9rem;font-weight:700;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .side-hdr h1::before{content:'⎔';font-size:1.1rem;color:var(--cyan)}
  .side-hdr .badge{display:inline-block;font-size:.45rem;
    background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.15);
    color:var(--cyan);padding:2px 6px;border-radius:3px;font-weight:600;
    letter-spacing:.06em;margin-top:6px;font-family:var(--mono)}
  .side-hdr .badge::before{content:'> '}
  .side-search{padding:10px 12px;border-bottom:1px solid var(--border)}
  .side-search input{width:100%;padding:8px 12px;background:rgba(3,7,17,.6);
    border:1px solid var(--border);border-radius:4px;color:var(--text);
    font-size:.78rem;outline:none;transition:all .15s;font-family:var(--mono)}
  .side-search input:focus{border-color:rgba(0,200,255,.25);box-shadow:0 0 0 1px rgba(0,200,255,.1)}
  .side-search input::placeholder{color:var(--text2);opacity:.4;font-family:var(--font)}
  .nav-grp-title{padding:14px 16px 4px 18px;font-size:.55rem;font-weight:600;
    text-transform:uppercase;letter-spacing:.1em;color:var(--text2);
    cursor:pointer;display:flex;align-items:center;justify-content:space-between;
    user-select:none;opacity:.5;transition:opacity .15s}
  .nav-grp-title:hover{opacity:.8;color:var(--text)}
  .nav-grp-title .arrow{font-size:.45rem;transition:transform .2s;color:inherit}
  .nav-grp-title .arrow.open{transform:rotate(90deg)}
  .nav-items{overflow:hidden;max-height:0;transition:max-height .2s ease}
  .nav-items.open{max-height:1000px}
  .nav-link{display:flex;align-items:center;padding:5px 16px 5px 22px;
    font-size:.78rem;color:var(--text2);text-decoration:none;
    transition:all .12s;cursor:pointer;position:relative}
  .nav-link:hover{color:var(--text)}
  .nav-link.active{color:var(--cyan)}
  .nav-link .ico{margin-right:8px;width:16px;text-align:center;font-size:.7rem;opacity:.7}
  .nav-link.active .ico{opacity:1}

  .main{margin-left:var(--side);flex:1;min-height:100vh;max-width:100%;position:relative}
  .topbar{position:sticky;top:0;height:36px;
    background:rgba(3,7,17,.7);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 24px;z-index:50;
    gap:12px;font-size:.65rem;font-family:var(--mono);color:var(--text2)}
  .topbar .menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1rem;cursor:pointer;padding:4px;border-radius:3px}
  .topbar .menu-btn:hover{background:rgba(0,200,255,.06)}
  .topbar .sep{width:1px;height:12px;background:var(--border)}
  .topbar .label{color:var(--text2);opacity:.5}
  .topbar .value{color:var(--cyan)}
  .topbar .dot{width:4px;height:4px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px}

  .content{padding:28px 32px;max-width:1160px;position:relative}
  .content::after{content:'☰';position:fixed;bottom:12px;right:24px;font-size:.5rem;color:var(--text2);opacity:.12;pointer-events:none;font-family:var(--mono)}
  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
    .main{margin-left:0}.topbar .menu-btn{display:block}.content{padding:16px}
    .topbar .right{display:none}
  }

  .section-card{border:1px solid var(--border);margin-bottom:24px;
    background:rgba(10,16,32,.5);position:relative;
    transition:border-color .2s}
  .section-card:hover{border-color:rgba(0,200,255,.12)}
  .section-hdr{display:flex;align-items:center;gap:12px;
    padding:0;position:relative;
    background:rgba(0,200,255,.02);
    clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),0 100%)}
  .section-hdr .left{display:flex;align-items:center;
    gap:10px;padding:14px 20px 14px;flex:1}
  .section-hdr .left .icon{font-size:1rem;width:22px;text-align:center}
  .section-hdr h2{font-size:.95rem;font-weight:500;color:var(--text);letter-spacing:-.01em}
  .section-hdr .badge{font-size:.55rem;
    background:rgba(0,200,255,.04);border:1px solid rgba(0,200,255,.08);
    color:var(--cyan);padding:1px 8px;border-radius:3px;
    font-weight:500;font-family:var(--mono)}
  .section-body{padding:0 20px 20px}
  .section-intro{margin-bottom:16px}.section-intro p{color:var(--text2);font-size:.82rem;max-width:750px;line-height:1.6}
  .subtitle{font-size:.75rem;font-weight:600;color:var(--cyan);
    margin:18px 0 10px;padding:0 0 4px 8px;
    border-left:2px solid var(--cyan);letter-spacing:.04em;font-family:var(--mono)}

  .search-hit{display:flex;align-items:center;gap:14px;
    padding:14px 18px;background:rgba(10,16,32,.5);
    border:1px solid var(--border);margin-bottom:8px;cursor:pointer;
    transition:border-color .15s}
  .search-hit:hover{border-color:rgba(0,200,255,.15)}
  .search-hit-icon{font-size:1.1rem}
  .search-hit-title{font-size:.85rem;font-weight:500;color:var(--text)}
  .search-hit-desc{font-size:.72rem;color:var(--text2);margin-top:2px}

  .grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:12px 0}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin:12px 0}
  .info-card{background:rgba(15,26,48,.4);border:1px solid var(--border);padding:14px;transition:border-color .15s}
  .info-card:hover{border-color:rgba(0,200,255,.1)}
  .info-card h4{font-size:.82rem;margin-bottom:5px;color:var(--text);display:flex;align-items:center;gap:6px}
  .info-card p{font-size:.73rem;color:var(--text2);line-height:1.5}
  .info-card .tags{margin-top:8px;display:flex;gap:3px;flex-wrap:wrap}
  .tag{display:inline-block;font-size:.58rem;padding:1px 7px;font-weight:500}
  .t-b{background:rgba(0,200,255,.08);color:var(--cyan)}.t-g{background:rgba(34,197,94,.08);color:var(--green)}
  .t-y{background:rgba(234,179,8,.08);color:var(--yellow)}.t-r{background:rgba(239,68,68,.08);color:var(--red)}
  .t-p{background:rgba(168,85,247,.08);color:var(--purple)}.t-o{background:rgba(249,115,22,.08);color:var(--orange)}
  .cw{overflow-x:auto;margin:12px 0;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:.74rem}
  thead{background:rgba(15,26,48,.4)}
  th{padding:8px 12px;text-align:left;font-weight:600;color:var(--text);
    border-bottom:1px solid var(--border);white-space:nowrap;
    font-size:.68rem;font-family:var(--mono);letter-spacing:.02em}
  td{padding:8px 12px;border-bottom:1px solid rgba(0,200,255,.03);color:var(--text2)}
  tr:last-child td{border-bottom:none}tr:hover td{background:rgba(0,200,255,.02)}
  pre{background:rgba(3,7,17,.7);border:1px solid var(--border);
    padding:14px 16px;overflow-x:auto;font-family:var(--mono);
    font-size:.74rem;line-height:1.5;margin:12px 0;
    position:relative;cursor:pointer;transition:border-color .15s}
  pre:hover{border-color:rgba(0,200,255,.15)}
  pre .lb{position:absolute;top:5px;right:10px;
    font-size:.5rem;color:var(--text2);font-family:var(--mono);
    opacity:.3;pointer-events:none}
  pre code{background:none;padding:0;border-radius:0;color:#b0c8e0;font-size:.74rem}
  code{font-family:var(--mono);font-size:.8em;background:rgba(0,200,255,.06);padding:1px 4px;color:var(--cyan)}
  .callout{padding:14px 18px;margin:14px 0;border-left:2px solid;font-size:.8rem;background:rgba(10,16,32,.4)}
  .callout-i{border-color:var(--cyan);background:rgba(0,200,255,.03)}
  .callout-w{border-color:var(--yellow);background:rgba(234,179,8,.03)}
  .callout-d{border-color:var(--red);background:rgba(239,68,68,.03)}
  .callout-g{border-color:var(--green);background:rgba(34,197,94,.03)}
  .callout strong{display:block;margin-bottom:3px;font-size:.8rem;color:var(--text)}
  .pill{display:inline-block;padding:1px 8px;font-size:.62rem;font-weight:500}
  .p-c{background:rgba(239,68,68,.1);color:var(--red)}
  .p-h{background:rgba(234,179,8,.1);color:var(--yellow)}
  .p-m{background:rgba(0,200,255,.08);color:var(--cyan)}
  .p-l{background:rgba(107,127,160,.1);color:var(--text2)}
  .hl{background:rgba(234,179,8,.2);padding:0 2px}
  .accordion{border:1px solid var(--border);margin:8px 0}
  .acc-hdr{padding:10px 14px;background:rgba(15,26,48,.4);
    cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;font-size:.8rem;font-weight:500;
    color:var(--text);user-select:none;transition:background .1s}
  .acc-hdr:hover{background:rgba(15,26,48,.6)}
  .acc-hdr .arrow{font-size:.55rem;transition:transform .15s;color:var(--cyan);opacity:.4}
  .acc-hdr .arrow.open{transform:rotate(90deg)}
  .acc-body{display:none;padding:0}
  .acc-body.open{display:block}
  .acc-line{padding:4px 14px;font-size:.72rem;color:var(--text2);font-family:var(--mono);line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .acc-line:first-child{margin-top:10px;padding-top:4px;border-top:1px solid var(--border)}
  .acc-line:last-child{margin-bottom:10px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:99}
  .overlay.open{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .mitre-matrix{display:flex;gap:6px;overflow-x:auto;padding:8px 0 14px;scrollbar-width:thin;position:relative}
  .mitre-matrix::after{content:'← desplazá';display:block;position:sticky;right:6px;bottom:0;
    font-size:.55rem;color:var(--cyan);background:rgba(10,16,32,.8);
    padding:3px 10px;border:1px solid rgba(0,200,255,.15);
    white-space:nowrap;pointer-events:none;opacity:.6;align-self:flex-end;font-family:var(--mono)}
  .mitre-col{flex:0 0 160px;min-width:160px;background:rgba(15,26,48,.3);border:1px solid var(--border);overflow:hidden}
  .mitre-col:hover{border-color:rgba(0,200,255,.1)}
  .mitre-col-hdr{background:rgba(0,200,255,.03);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border)}
  .mitre-col-hdr .mitre-ta{display:block;font-size:.62rem;font-weight:600;color:var(--cyan);font-family:var(--mono)}
  .mitre-col-hdr .mitre-tn{display:block;font-size:.65rem;color:var(--text);font-weight:500;margin-top:2px}
  .mitre-techs{padding:2px 0;max-height:340px;overflow-y:auto}
  .mitre-tech,.mitre-sub{padding:5px 8px;border-bottom:1px solid rgba(0,200,255,.015);cursor:pointer;transition:background .1s}
  .mitre-tech:hover,.mitre-sub:hover{background:rgba(0,200,255,.04)}
  .mitre-tech .mitre-tid,.mitre-sub .mitre-tid{font-size:.55rem;font-weight:600;color:var(--yellow);font-family:var(--mono)}
  .mitre-tech .mitre-tname,.mitre-sub .mitre-tname{font-size:.6rem;color:var(--text);display:block;line-height:1.25;margin-top:1px}
  .mitre-tech .mitre-desc,.mitre-sub .mitre-desc{font-size:.55rem;color:var(--text2);display:block;line-height:1.3;margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .mitre-sub{padding-left:14px;background:rgba(0,0,0,.1)}
  .mitre-sub .mitre-tname{font-size:.58rem}
  .mitre-sub .mitre-desc{font-size:.52rem}
  .mitre-subs{border-top:1px solid var(--border);max-height:160px;overflow-y:auto}
</style>
</head>
<body><div id="root"></div>
<script>

"use strict";

const { useState, useRef, useEffect, useCallback, useMemo } = React;
const e = React.createElement;

// ===== DATA =====

// ===== COMPONENTS =====
function CodeBlock(props) {
  const [copied, setCopied] = React.useState(false);
  const text = props.lines.join('\n');
  function copy() {
    navigator.clipboard.writeText(text).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1200);
    });
  }
  return e('pre',{onClick:copy,title:'Click para copiar'},
    e('span',{className:'lb'},copied ? '\u2713 Copiado' : props.lang),
    e('code',null,props.lines.map(function(l,i){
      return React.createElement(React.Fragment,{key:i},l,'\n');
    }))
  );
}

function Callout(props) {
  var s = {i:'callout-i',w:'callout-w',d:'callout-d',g:'callout-g'}[props.style] || 'callout-i';
  return e('div',{className:'callout '+s},
    e('strong',null,props.title),
    props.body
  );
}

function TableView(props) {
  return e('div',{className:'cw'},
    e('table',null,
      e('thead',null,e('tr',null,props.headers.map(function(h,i){return e('th',{key:i},h)}))),
      e('tbody',null,props.rows.map(function(r,ri){
        return e('tr',{key:ri},r.map(function(c,ci){return e('td',{key:ci},c)}))
      }))
    )
  );
}

function GridView(props) {
  return e('div',{className:'grid-2'},
    props.items.map(function(it,i){
      var tc = {b:'t-b',g:'t-g',y:'t-y',r:'t-r',p:'t-p',o:'t-o'}[it.c] || 't-b';
      return e('div',{className:'info-card',key:i},
        e('h4',null,it.i+' '+it.t),
        e('p',null,it.d),
        it.g ? e('div',{className:'tags'},e('span',{className:'tag '+tc},it.g)) : null
      );
    })
  );
}

function TabSwitcher(props) {
  var _useState = React.useState(0), active = _useState[0], setActive = _useState[1];
  return e('div',{className:'tabs'},
    e('div',{className:'tab-bar'},props.tabs.map(function(t,i){
      return e('button',{key:i,className:'tab-btn'+(i===active?' active':''),onClick:function(){setActive(i)}},t.label);
    })),
    e('div',{className:'tab-content'},props.tabs.map(function(t,i){
      return i===active ? e('div',{key:i,className:'tab-pane active'},e(CodeBlock,{lang:t.lang,lines:t.lines})) : null;
    }))
  );
}

function Accordion(props) {
  var _useState2 = React.useState(null), open = _useState2[0], setOpen = _useState2[1];
  return e('div',null,props.items.map(function(it,i){
    var isOpen = open === i;
    return e('div',{className:'accordion',key:i},
      e('div',{className:'acc-hdr',onClick:function(){setOpen(isOpen?null:i)}},
        it.title,
        e('span',{className:'arrow'+(isOpen?' open':'')},'\u25B6')
      ),
      e('div',{className:'acc-body'+(isOpen?' open':'')},
        it.lines.map(function(l,li){return e('div',{key:li,className:'acc-line'},l)})
      )
    );
  }));
}

function MitreTech(props) {
  var t = props.tech, isSub = props.isSub;
  var cls = isSub ? 'mitre-sub' : 'mitre-tech';
  var url = t.url || 'https://attack.mitre.org/techniques/'+t.id.replace('.','/');
  function openUrl(e) {
    e.stopPropagation();
    window.open(url, '_blank', 'noopener');
  }
  return e('div',{className:cls,onClick:openUrl,title:'Click para ver en MITRE ATT&CK'},
    e('span',{className:'mitre-tid'},t.id),
    e('span',{className:'mitre-tname'},t.name),
    t.desc ? e('span',{className:'mitre-desc'},t.desc) : null
  );
}

function MitreMatrix(props) {
  var tacs = props.tactics || [];
  return e('div',{className:'mitre-matrix'},
    tacs.map(function(t,i){
      var techs = t.techniques || [];
      var parents = techs.filter(function(x){return !x.is_sub});
      var subs = techs.filter(function(x){return x.is_sub});
      return e('div',{className:'mitre-col',key:i},
        e('div',{className:'mitre-col-hdr'},
          e('span',{className:'mitre-ta'},t.id),
          e('span',{className:'mitre-tn'},t.name)
        ),
        e('div',{className:'mitre-techs'},
          parents.map(function(pt,pi){
            return e(MitreTech,{key:'p'+pi,tech:pt,isSub:false});
          })
        ),
        subs.length > 0 ? e('div',{className:'mitre-subs'},
          subs.map(function(st,si){
            return e(MitreTech,{key:'s'+si,tech:st,isSub:true});
          })
        ) : null
      );
    })
  );
}

function renderContent(block, mitreMatrix) {
  switch(block.type) {
    case 'table': return e(TableView,{headers:block.h,rows:block.r});
    case 'grid': return e(GridView,{items:block.items});
    case 'code': return e(CodeBlock,{lang:block.lang,lines:block.lines});
    case 'callout': return e(Callout,{style:block.s,title:block.title,body:block.body});
    case 'tabs': return e(TabSwitcher,{tabs:block.tabs});
    case 'accordion': return e(Accordion,{items:block.items});
    case 'mitre': return e(MitreMatrix, {tactics: mitreMatrix});
    case 'sub': return e('div',{className:'subtitle'},block.title);
    default: return null;
  }
}

// ===== SECTION COMPONENT =====
function SectionCard(props) {
  var s = props.section, mitreMatrix = props.mitreMatrix;
  return e('div',{className:'section-card',id:s.id},
    e('div',{className:'section-hdr'},
      e('div',{className:'left'},
        e('span',{className:'icon'},s.icon),
        e('h2',null,s.title),
        s.badge ? e('span',{className:'badge'},s.badge) : null
      )
    ),
    e('div',{className:'section-body open'},
      s.desc ? e('div',{className:'section-intro'},e('p',null,s.desc)) : null,
      s.content ? s.content.map(function(b,i){return e(React.Fragment,{key:i},renderContent(b, mitreMatrix))}) : null
    )
  );
}

// ===== NAV GROUP =====
function NavGroup(props) {
  var _useState3 = React.useState(true), open = _useState3[0], setOpen = _useState3[1];
  var g = props.group, active = props.active, onNav = props.onNav;
  return e('div',{className:'nav-group'},
    e('div',{className:'nav-grp-title',onClick:function(){setOpen(!open)}},
      g.t,
      e('span',{className:'arrow'+(open?' open':'')},'\u25B6')
    ),
    e('div',{className:'nav-items'+(open?' open':'')},
      g.items.map(function(item,i){
        return e('a',{key:i,className:'nav-link'+(active===item.id?' active':''),onClick:function(e){e.preventDefault();onNav(item.id)}},
          e('span',{className:'ico'},item.i),
