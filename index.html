<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Guide</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0a0e14;
    --bg2:#0f131a;
    --bg3:#141a24;
    --bg4:#1a2230;
    --bd:rgba(255,255,255,.04);
    --text:#d4dce8;
    --text2:#5c6e8a;
    --cyan:#26c6da;
    --blue:#42a5f5;
    --green:#66bb6a;
    --yellow:#fdd835;
    --red:#ef5350;
    --purple:#ab47bc;
    --orange:#ffa726;
    --font:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono','Fira Code',monospace;
    --r:6px
  }

  html{font-size:13.5px;scroll-behavior:smooth}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
  ::selection{background:rgba(38,198,218,.2);color:var(--text)}

  /* ===== LAYOUT ===== */
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}

  /* ===== TOPBAR ===== */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,20,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:0}
  .topbar .wrap{display:flex;align-items:center;height:52px;gap:14px}
  .topbar .logo{font-size:.82rem;font-weight:700;color:var(--text);font-family:var(--mono);display:flex;align-items:center;gap:8px;white-space:nowrap}
  .topbar .logo::before{content:'⎔';color:var(--cyan);font-size:1rem}
  .topbar .logo .ver{color:var(--text2);font-size:.5rem;font-weight:400;padding:1px 5px;border:1px solid var(--bd);border-radius:3px;font-family:var(--font)}
  .topbar .sep{width:1px;height:16px;background:var(--bd)}
  .topbar .dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .topbar .stats{display:flex;gap:10px;font-size:.6rem;font-family:var(--mono);color:var(--text2);align-items:center}
  .topbar .stats span{color:var(--cyan)}

  /* ===== FILTER TABS ===== */
  .filters{position:sticky;top:52px;z-index:99;background:var(--bg2);border-bottom:1px solid var(--bd);padding:0}
  .filters .wrap{display:flex;gap:2px;padding:8px 0;overflow-x:auto;flex-wrap:nowrap}
  .filters .wrap::-webkit-scrollbar{height:0}
  .f-btn{padding:6px 14px;font-size:.65rem;font-family:var(--mono);font-weight:500;background:transparent;border:none;color:var(--text2);cursor:pointer;white-space:nowrap;border-radius:var(--r);transition:all .12s}
  .f-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
  .f-btn.active{color:var(--cyan);background:rgba(38,198,218,.08)}
  .f-btn .cnt{font-size:.5rem;color:var(--text2);opacity:.5;margin-left:5px}

  /* ===== SECTIONS ===== */
  .sections{padding:20px 0 40px}
  .section{margin-bottom:20px;display:block}
  .section.hidden{display:none}
  .section-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg3);border:1px solid var(--bd);border-bottom:none;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;transition:background .12s}
  .section-hdr:hover{background:var(--bg4)}
  .section-hdr .icon{font-size:1rem;width:20px;text-align:center}
  .section-hdr h2{font-size:.85rem;font-weight:600;color:var(--text)}
  .section-hdr .cnt-badge{font-size:.5rem;padding:1px 8px;border-radius:8px;background:rgba(255,255,255,.04);color:var(--text2);font-family:var(--mono)}
  .section-hdr .toggle{font-size:.55rem;color:var(--text2);margin-left:auto;transition:transform .2s}
  .section-hdr .toggle.open{transform:rotate(180deg)}

  .section-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);background:var(--bg2);overflow:hidden;transition:max-height .25s ease}
  .section-body.closed{max-height:0 !important;padding:0 !important;border:none}
  .section-body.open{max-height:50000px;padding:16px 16px 20px}

  /* ===== CONTENT BLOCKS ===== */
  .sub-title{font-size:.72rem;font-weight:600;color:var(--cyan);padding:12px 0 6px 10px;border-left:2px solid var(--cyan);margin:10px 0 6px;font-family:var(--mono);letter-spacing:.03em}

  /* callout */
  .callout{padding:10px 14px;margin:8px 0;border-radius:var(--r);font-size:.72rem;line-height:1.5;border-left:3px solid}
  .callout-i{background:rgba(66,165,245,.05);border-color:var(--blue);color:var(--text)}
  .callout-w{background:rgba(255,167,38,.05);border-color:var(--orange);color:var(--text)}
  .callout-d{background:rgba(239,83,80,.05);border-color:var(--red);color:var(--text)}
  .callout-g{background:rgba(102,187,106,.05);border-color:var(--green);color:var(--text)}
  .callout-title{font-weight:600;font-size:.75rem;margin-bottom:3px}

  /* table */
  .tbl-wrap{overflow-x:auto;margin:8px 0}
  table{width:100%;border-collapse:collapse;font-size:.68rem}
  thead{background:var(--bg3)}
  th{padding:7px 10px;text-align:left;font-weight:600;color:var(--text2);font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bd);white-space:nowrap}
  td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top;color:var(--text)}
  tbody tr:hover{background:rgba(255,255,255,.015)}

  /* pills/tags in tables */
  .pill{display:inline-block;padding:1px 8px;border-radius:3px;font-size:.58rem;font-weight:600;font-family:var(--mono)}
  .p-c{background:rgba(239,83,80,.15);color:var(--red)}
  .p-h{background:rgba(255,167,38,.15);color:var(--orange)}
  .p-m{background:rgba(255,216,53,.12);color:var(--yellow)}
  .p-l{background:rgba(92,110,138,.2);color:var(--text2)}
  .tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:.55rem;font-weight:500;font-family:var(--mono)}
  .t-r{background:rgba(239,83,80,.12);color:var(--red)}
  .t-o{background:rgba(255,167,38,.12);color:var(--orange)}
  .t-y{background:rgba(253,216,53,.1);color:var(--yellow)}
  .t-b{background:rgba(66,165,245,.1);color:var(--blue)}
  .t-g{background:rgba(102,187,106,.1);color:var(--green)}
  .t-p{background:rgba(171,71,188,.1);color:var(--purple)}

  /* code blocks */
  .code-block{margin:8px 0;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
  .code-hdr{display:flex;align-items:center;padding:5px 12px;background:var(--bg3);border-bottom:1px solid var(--bd);font-size:.58rem;font-family:var(--mono);color:var(--text2);gap:8px}
  .code-hdr .lang{font-weight:600;color:var(--cyan);text-transform:uppercase}
  .code-hdr .copy-btn{margin-left:auto;background:transparent;border:1px solid var(--bd);color:var(--text2);cursor:pointer;padding:2px 8px;border-radius:3px;font-size:.5rem;font-family:var(--mono);transition:all .12s}
  .code-hdr .copy-btn:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:rgba(255,255,255,.1)}
  .code-body{padding:10px 14px;overflow-x:auto}
  .code-body code{font-family:var(--mono);font-size:.65rem;line-height:1.5;color:var(--text);white-space:pre}
  .code-body .cm{color:var(--text2);opacity:.5}
  .code-body .kw{color:var(--purple)}
  .code-body .fn{color:var(--cyan)}
  .code-body .str{color:var(--green)}
  .code-body .num{color:var(--orange)}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin:8px 0}
  .g-card{padding:10px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r)}
  .g-card h4{font-size:.72rem;font-weight:600;margin-bottom:3px;color:var(--text)}
  .g-card p{font-size:.65rem;color:var(--text2);line-height:1.4}
  .g-card .g-tag{display:inline-block;margin-top:6px;padding:1px 7px;border-radius:3px;font-size:.5rem;font-weight:500;font-family:var(--mono)}

  /* accordion */
  .accordion{border:1px solid var(--bd);border-radius:var(--r);margin:6px 0;overflow:hidden}
  .acc-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);cursor:pointer;font-size:.72rem;font-weight:500;transition:background .12s}
  .acc-hdr:hover{background:var(--bg4)}
  .acc-hdr .arr{margin-left:auto;font-size:.5rem;color:var(--text2);transition:transform .2s}
  .acc-hdr .arr.open{transform:rotate(90deg)}
  .acc-body{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .2s ease}
  .acc-body.open{max-height:5000px;padding:8px 12px}
  .acc-line{font-size:.65rem;padding:2px 0;color:var(--text2);font-family:var(--mono)}

  /* mitre */
  .mitre-wrap{overflow-x:auto;margin:8px 0}
  .mitre-row{display:flex;gap:4px;min-width:max-content;padding:2px 0}
  .mitre-cell{min-width:150px;padding:6px 8px;background:var(--bg3);border:1px solid var(--bd);border-radius:3px;cursor:pointer;transition:all .12s}
  .mitre-cell:hover{border-color:var(--cyan);background:rgba(38,198,218,.04)}
  .mitre-cell .tid{font-size:.55rem;font-family:var(--mono);color:var(--cyan);display:block}
  .mitre-cell .tname{font-size:.6rem;color:var(--text);display:block;margin-top:1px}
  .mitre-cell .tdesc{font-size:.52rem;color:var(--text2);display:block;margin-top:2px}
  .mitre-cell.tac-hdr{background:var(--bg4);min-width:120px;cursor:default}
  .mitre-cell.tac-hdr .tname{font-size:.58rem;font-weight:600;color:var(--yellow)}

  /* tooltip */
  .copy-tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--green);padding:8px 20px;border-radius:var(--r);font-size:.65rem;font-family:var(--mono);border:1px solid rgba(102,187,106,.2);z-index:999;pointer-events:none;animation:fadeUp .3s ease forwards}
  @keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

  /* ===== RESPONSIVE ===== */
  @media(max-width:700px){
    .wrap{padding:0 14px}
    .topbar .wrap{height:44px;gap:8px}
    .topbar .stats{display:none}
    .filters .wrap{gap:0;padding:6px 0}
    .f-btn{padding:4px 10px;font-size:.6rem}
    .section-hdr{padding:10px 12px}
    .section-body.open{padding:10px 10px 14px}
    .grid{grid-template-columns:1fr}
    td,th{padding:4px 6px;font-size:.62rem}
    .code-body{padding:8px 10px;font-size:.6rem}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
var e = React.createElement;

// ===== COPY UTILITY =====
var CopiedTip = null;
function showCopied() {
  if (CopiedTip) return;
  CopiedTip = document.createElement('div');
  CopiedTip.className = 'copy-tip';
  CopiedTip.textContent = '✓ Copiado';
  document.body.appendChild(CopiedTip);
  setTimeout(function(){CopiedTip.remove();CopiedTip=null},1200);
}

function copyText(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(showCopied).catch(function(){})}
}

// ===== COMPONENTS =====
function CodeBlock(p){
  var lines = p.lines || [];
  var txt = lines.join('\n');

  function renderLine(l){
    return l
      .replace(/<span class="cm">(.*?)<\/span>/g,'\x00CM$1\x01')
      .replace(/<span class="kw">(.*?)<\/span>/g,'\x00KW$1\x01')
      .replace(/<span class="fn">(.*?)<\/span>/g,'\x00FN$1\x01')
      .replace(/<span class="str">(.*?)<\/span>/g,'\x00ST$1\x01')
      .replace(/<span class="num">(.*?)<\/span>/g,'\x00NU$1\x01');
  }

  var html = lines.map(function(l){return '<span class="cm"># </span>'+renderLine(l)}).join('\n');

  return e('div',{className:'code-block'},
    e('div',{className:'code-hdr'},
      e('span',{className:'lang'},p.lang||'shell'),
      e('button',{className:'copy-btn',onClick:function(){copyText(txt)}},'⎘ copiar')
    ),
    e('div',{className:'code-body'},
      e('code',{dangerouslySetInnerHTML:{__html:html}})
    )
  );
}

function Callout(p){
  var cls = 'callout callout-'+p.s;
  return e('div',{className:cls},
    e('div',{className:'callout-title'},p.title),
    e('div',null,p.body)
  );
}

function TableView(p){
  return e('div',{className:'tbl-wrap'},
    e('table',null,
      e('thead',null,e('tr',null,p.h.map(function(h,i){return e('th',{key:i},h)}))),
      e('tbody',null,p.r.map(function(r,ri){
        return e('tr',{key:ri},r.map(function(c,ci){return e('td',{key:ci},
          typeof c==='string'&&c.includes('</span>')?e('span',{dangerouslySetInnerHTML:{__html:c}}):c
        )}))
      }))
    )
  );
}

function GridView(p){
  return e('div',{className:'grid'},
    p.items.map(function(it,i){
      var tc = {b:'t-b',g:'t-g',y:'t-y',r:'t-r',p:'t-p',o:'t-o'}[it.c]||'t-b';
      return e('div',{className:'g-card',key:i},
        e('h4',null,(it.i||'')+' '+it.t),
        e('p',null,it.d||it.body),
        it.g?e('span',{className:'g-tag '+tc},it.g):null
      );
    })
  );
}

function TabSwitcher(p){
  var _a=React.useState(0),active=_a[0],setActive=_a[1];
  return e('div',null,
    e('div',{style:{display:'flex',gap:4,margin:'8px 0',flexWrap:'wrap'}},
      p.tabs.map(function(t,i){return e('button',{key:i,
        style:{padding:'4px 12px',fontSize:'.62rem',fontFamily:'var(--mono)',background:i===active?'rgba(38,198,218,.1)':'var(--bg3)',border:'1px solid var(--bd)',color:i===active?'var(--cyan)':'var(--text2)',cursor:'pointer',borderRadius:'4px'},
        onClick:function(){setActive(i)}},t.label)})
    ),
    p.tabs.map(function(t,i){return i===active?
      e('div',{key:i},e(CodeBlock,{lang:t.lang,lines:t.lines})):null})
  );
}

function Accordion(p){
  var _a2=React.useState(null),open=_a2[0],setOpen=_a2[1];
  return e('div',null,p.items.map(function(it,i){
    var isO=open===i;
    return e('div',{className:'accordion',key:i},
      e('div',{className:'acc-hdr',onClick:function(){setOpen(isO?null:i)}},
        it.title,
        e('span',{className:'arr'+(isO?' open':'')},'\u25B6')
      ),
      e('div',{className:'acc-body'+(isO?' open':'')},
        it.lines.map(function(l,li){return e('div',{className:'acc-line',key:li},l)})
      )
    );
  }));
}

function MitreTech(p){
  var t=p.tech;
  var url=t.url||'https://attack.mitre.org/techniques/'+t.id.replace('.','/');
  function openUrl(e2){e2.stopPropagation();window.open(url,'_blank','noopener')}
  return e('div',{className:'mitre-cell',onClick:openUrl,title:'Ver en MITRE ATT&CK'},
    e('span',{className:'tid'},t.id),
    e('span',{className:'tname'},t.name),
    t.desc?e('span',{className:'tdesc'},t.desc):null
  );
}

function MitreMatrix(p){
  var tacs=p.tactics||[];
  return e('div',{className:'mitre-wrap'},
    tacs.map(function(t,i){
      var techs=t.techniques||[];
      var all=[];
      techs.forEach(function(x){
        if(!x.is_sub) all.push(x);
      });
      return e('div',{className:'mitre-row',key:i},
        e('div',{className:'mitre-cell tac-hdr'},
          e('span',{className:'tid'},t.id),
          e('span',{className:'tname'},t.name)
        ),
        all.map(function(pt,pi){return e(MitreTech,{key:pi,tech:pt})})
      );
    })
  );
}

// ===== FILTER GROUPS =====
var FILTERS = [
  {id:'all',label:'ALL',sections:[]},
  {id:'triage',label:'TRIAGE',sections:['triage','severidad']},
  {id:'windows',label:'WINDOWS',sections:['evtx','sysmon','win-cmd','lolbins']},
  {id:'linux',label:'LINUX',sections:['linux-cmd','linux-logs']},
  {id:'network',label:'NETWORK',sections:['network','queries']},
  {id:'playbooks',label:'PLAYBOOKS',sections:['containment','playbooks']},
  {id:'mitre',label:'MITRE',sections:['mitre']},
  {id:'tools',label:'TOOLS',sections:['forensics','malware','tools','cheat']}
];

// ===== RENDER CONTENT =====
function renderBlock(block,mitreMatrix){
  switch(block.type){
    case 'table': return e(TableView,{h:block.h,r:block.r});
    case 'grid': return e(GridView,{items:block.items});
    case 'code': return e(CodeBlock,{lang:block.lang,lines:block.lines});
    case 'callout': return e(Callout,{s:block.s,title:block.title,body:block.body});
    case 'tabs': return e(TabSwitcher,{tabs:block.tabs});
    case 'accordion': return e(Accordion,{items:block.items});
    case 'mitre': return e(MitreMatrix,{tactics:mitreMatrix});
    case 'sub': return e('div',{className:'sub-title'},block.title);
    default: return null;
  }
}

// ===== SECTION CARD =====
function SectionCard(p){
  var s=p.section, mm=p.mitreMatrix;
  var _a=React.useState(true),open=_a[0],setOpen=_a[1];
  var totalBl=s.content?blCount(s.content):0;
  return e('div',{className:'section',id:s.id},
    e('div',{className:'section-hdr',onClick:function(){setOpen(!open)}},
      e('span',{className:'icon'},s.icon),
      e('h2',null,s.title),
      e('span',{className:'cnt-badge'},totalBl+' bloques'),
      e('span',{className:'toggle'+(open?' open':'')},'\u25BC')
    ),
    e('div',{className:'section-body'+(open?' open':' closed')},
      s.desc?e('div',{style:{fontSize:'.68rem',color:'var(--text2)',marginBottom:'8px',lineHeight:'1.4'}},s.desc):null,
      s.content?s.content.map(function(b,i){return e(React.Fragment,{key:i},renderBlock(b,mm))}):null
    )
  );
}

function blCount(content){
  var n=0;
  content.forEach(function(b){
    if(b.type==='table')n+=b.r.length;
    else if(b.type==='grid')n+=b.items.length;
    else if(b.type==='code')n++;
    else if(b.type==='callout')n++;
    else if(b.type==='sub')n++;
    else n++;
  });
  return n;
}

// ===== APP =====
function App(){
  var _a=React.useState(null),data=_a[0],setData=_a[1];
  var _b=React.useState(true),loading=_b[0],setLoading=_b[1];
  var _c=React.useState(null),err=_c[0],setErr=_c[1];
  var _d=React.useState('all'),filter=_d[0],setFilter=_d[1];

  React.useEffect(function(){
    fetch('data/sections.json')
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
      .then(function(d){setData(d);setLoading(false)})
      .catch(function(e2){setErr(e2.message);setLoading(false)});
  },[]);

  var sections=data&&data.sections?data.sections:[];
  var mitreMatrix=data&&data.mitreMatrix?data.mitreMatrix:[];

  var filteredSections=React.useMemo(function(){
    if(filter==='all')return sections;
    var f=FILTERS.find(function(x){return x.id===filter});
    if(!f)return sections;
    return sections.filter(function(s){return f.sections.indexOf(s.id)>=0});
  },[filter,sections]);

  // loading
  if(loading)return e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:14,background:'var(--bg)'}},
    e('div',{style:{width:22,height:22,border:'1.5px solid rgba(255,255,255,.05)',borderTopColor:'var(--cyan)',borderRadius:'50%',animation:'spin 1s linear infinite'}}),
    e('p',{style:{fontSize:'.65rem',fontFamily:'var(--mono)',color:'var(--text2)',opacity:.5}},'loading...')
  );
  if(err)return e('div',{style:{padding:40,textAlign:'center',color:'var(--red)'}},
    e('h2',null,'Error'),e('p',{style:{color:'var(--text2)',marginTop:8,fontSize:'.82rem'}},err)
  );
  if(!data)return null;

  return [
    // TOPBAR
    e('header',{className:'topbar',key:'topbar'},
      e('div',{className:'wrap'},
        e('div',{className:'logo'},'SOC Guide',e('span',{className:'ver'},'v1')),
        e('span',{className:'sep'}),
        e('span',{className:'dot'}),
        e('div',{className:'stats'},
          e('span',null,sections.length),' secciones',
          e('span',null,'•'),
          e('span',null,mitreMatrix.length||0),' tactics'
        )
      )
    ),
    // FILTERS
    e('div',{className:'filters',key:'filters'},
      e('div',{className:'wrap'},
        FILTERS.map(function(f){
          var c = f.id==='all' ? sections.length : sections.filter(function(s){return f.sections.indexOf(s.id)>=0}).length;
          return e('button',{key:f.id,className:'f-btn'+(filter===f.id?' active':''),onClick:function(){setFilter(f.id)}},
            f.label,
            e('span',{className:'cnt'},c)
          );
        })
      )
    ),
    // CONTENT
    e('div',{className:'sections',key:'content'},
      e('div',{className:'wrap'},
        filteredSections.map(function(s){
          return e(SectionCard,{key:s.id,section:s,mitreMatrix:mitreMatrix});
        }),
        filteredSections.length===0?
          e('div',{style:{textAlign:'center',padding:40,color:'var(--text2)',fontSize:'.78rem'}},'No hay secciones para este filtro.')
          :null,
        e('div',{style:{textAlign:'center',fontSize:'.5rem',color:'var(--text2)',opacity:.2,padding:'20px 0 8px',fontFamily:'var(--mono)'}},'// soc-guide')
      )
    )
  ];
}

// ===== RENDER =====
var root=document.getElementById('root');
try{ReactDOM.createRoot(root).render(e(App))}catch(ex){
  root.innerHTML='<div style="padding:40px;background:#080c14;color:#ef5350;font-family:monospace;min-height:100vh">'+
    '<h2>⚠ Error: '+ex.message+'</h2><pre style="color:#8b9db0;margin-top:12px">'+ex.stack+'</pre></div>';
}
</script>
</body>
</html>
