<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Analyst — Guía Interactiva</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080c14;
    --bg2:#0f1624;
    --bg3:#172236;
    --bg4:#1e2d42;
    --border:#1e3050;
    --text:#d0d9e8;
    --text2:#6a7f9e;
    --accent:#4a9eff;
    --green:#3dd68c;
    --yellow:#e8b339;
    --red:#f0605a;
    --purple:#b47cff;
    --cyan:#3dd6d0;
    --orange:#e88a3a;
    --radius:10px;
    --side:270px;
    --font:'Inter','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  html{scroll-behavior:smooth;font-size:15px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
  #root{display:flex;min-height:100vh}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--side);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .side-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:2}
  .side-hdr h1{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .side-hdr .badge{font-size:.55rem;background:var(--bg4);color:var(--text2);padding:2px 7px;border-radius:4px;font-weight:600}
  .side-search{padding:10px 12px;border-bottom:1px solid var(--border)}
  .side-search input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.8rem;outline:none;transition:border-color .2s}
  .side-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.15)}
  .side-search input::placeholder{color:var(--text2)}
  .nav-grp-title{padding:10px 16px 4px 18px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
  .nav-grp-title:hover{color:var(--text)}
  .nav-grp-title .arrow{font-size:.5rem;transition:transform .2s;color:var(--text2)}
  .nav-grp-title .arrow.open{transform:rotate(90deg)}
  .nav-items{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .nav-items.open{max-height:800px}
  .nav-link{display:flex;align-items:center;padding:5px 16px 5px 22px;font-size:.8rem;color:var(--text2);text-decoration:none;border-left:2px solid transparent;transition:all .12s;cursor:pointer}
  .nav-link:hover{color:var(--text);background:var(--bg3)}
  .nav-link.active{color:var(--accent);border-left-color:var(--accent);background:rgba(74,158,255,.07)}
  .nav-link .ico{margin-right:7px;width:16px;text-align:center;font-size:.75rem}

  .main{margin-left:var(--side);flex:1;min-height:100vh;max-width:100%}
  .topbar{position:sticky;top:0;height:50px;background:rgba(8,12,20,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;z-index:50;gap:14px}
  .topbar .menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.25rem;cursor:pointer;padding:4px;border-radius:6px}
  .topbar .menu-btn:hover{background:var(--bg3)}
  .topbar .bc{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:6px}
  .topbar .bc span{color:var(--text)}
  .topbar .bc .dot{width:4px;height:4px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .topbar .stats{display:flex;gap:14px;margin-left:auto;font-size:.72rem;color:var(--text2)}
  .topbar .stats span{display:flex;align-items:center;gap:4px}

  .content{padding:24px 32px;max-width:1100px}
  @media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.topbar .menu-btn{display:block}.content{padding:16px}.topbar .stats{display:none}}

  .section-card{margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;scroll-margin-top:65px}
  .section-card:hover{border-color:var(--bg4)}
  .section-hdr{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;gap:12px}
  .section-hdr:hover{background:var(--bg3)}
  .section-hdr .left{display:flex;align-items:center;gap:10px}
  .section-hdr .left .icon{font-size:1.2rem}
  .section-hdr h2{font-size:1.05rem;font-weight:600;color:var(--text)}
  .section-hdr .badge{font-size:.62rem;background:var(--bg4);color:var(--text2);padding:2px 9px;border-radius:10px;font-weight:500}
  .section-hdr .toggle{color:var(--text2);font-size:.8rem;transition:transform .25s;flex-shrink:0}
  .section-hdr .toggle.open{transform:rotate(180deg)}
  .section-body{padding:0 20px 20px;display:none}
  .section-body.open{display:block;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .section-intro{margin-bottom:16px}.section-intro p{color:var(--text2);font-size:.85rem;max-width:750px}
  .grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:12px 0}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:12px 0}
  .info-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px}
  .info-card h4{font-size:.85rem;margin-bottom:5px;color:var(--text);display:flex;align-items:center;gap:6px}
  .info-card p{font-size:.78rem;color:var(--text2);line-height:1.5}
  .info-card .tags{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}
  .tag{display:inline-block;font-size:.62rem;padding:2px 8px;border-radius:4px;font-weight:500}
  .t-b{background:rgba(74,158,255,.14);color:var(--accent)}.t-g{background:rgba(61,214,140,.14);color:var(--green)}
  .t-y{background:rgba(232,179,57,.14);color:var(--yellow)}.t-r{background:rgba(240,96,90,.14);color:var(--red)}
  .t-p{background:rgba(180,124,255,.14);color:var(--purple)}.t-o{background:rgba(232,138,58,.14);color:var(--orange)}
  .cw{overflow-x:auto;margin:10px 0;border:1px solid var(--border);border-radius:var(--radius)}

  pre{background:#050a12;border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:.77rem;line-height:1.55;margin:10px 0;position:relative;cursor:pointer}

  pre code{background:none;padding:0;border-radius:0;color:#b4c7e0;font-size:.77rem}
  .callout{border-radius:8px;padding:14px 18px;margin:14px 0;border-left:3px solid;font-size:.82rem}
  .callout-i{background:rgba(74,158,255,.07);border-color:var(--accent)}
  .callout-w{background:rgba(232,179,57,.07);border-color:var(--yellow)}
  .callout-d{background:rgba(240,96,90,.07);border-color:var(--red)}
  .callout-g{background:rgba(61,214,140,.07);border-color:var(--green)}
  .callout strong{display:block;margin-bottom:3px;font-size:.82rem}
  .pill{display:inline-block;padding:1px 9px;border-radius:10px;font-size:.68rem;font-weight:500}
  .p-c{background:rgba(240,96,90,.18);color:var(--red)}
  .p-h{background:rgba(232,179,57,.18);color:var(--yellow)}
  .p-m{background:rgba(74,158,255,.12);color:var(--accent)}
  .p-l{background:rgba(106,127,158,.14);color:var(--text2)}
  .hl{background:rgba(232,179,57,.25);padding:0 2px;border-radius:2px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .overlay.open{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .mitre-matrix{display:flex;gap:8px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:thin;position:relative}
  .mitre-matrix::after{content:'← Desplazá →';display:block;position:sticky;right:8px;bottom:0;font-size:.65rem;color:var(--text2);background:var(--bg2);padding:3px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;pointer-events:none;opacity:.7;align-self:flex-end}
  .mitre-col{flex:0 0 165px;min-width:165px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .mitre-col-hdr{background:var(--bg4);padding:8px 10px;text-align:center;border-bottom:1px solid var(--border)}
  .mitre-col-hdr .mitre-ta{display:block;font-size:.68rem;font-weight:700;color:var(--accent);letter-spacing:.03em}
  .mitre-col-hdr .mitre-tn{display:block;font-size:.72rem;color:var(--text);font-weight:500;margin-top:2px}
  .mitre-techs{padding:2px 0;max-height:360px;overflow-y:auto}
  .mitre-tech,.mitre-sub{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.02);cursor:pointer;transition:background .12s}
  .mitre-tech:hover,.mitre-sub:hover{background:rgba(74,158,255,.1)}
  .mitre-tech .mitre-tid,.mitre-sub .mitre-tid{font-size:.6rem;font-weight:600;color:var(--yellow);font-family:var(--mono)}
  .mitre-tech .mitre-tname,.mitre-sub .mitre-tname{font-size:.65rem;color:var(--text);display:block;line-height:1.25;margin-top:1px}
  .mitre-tech .mitre-desc,.mitre-sub .mitre-desc{font-size:.6rem;color:var(--text2);display:block;line-height:1.3;margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .mitre-sub{padding-left:14px;background:rgba(0,0,0,.12)}
  .mitre-sub .mitre-tname{font-size:.62rem}
  .mitre-sub .mitre-desc{font-size:.58rem}
  .mitre-subs{border-top:1px solid var(--border);max-height:180px;overflow-y:auto}
</style>
</head>
<body><div id="root"></div>
<script>

"use strict";

const { useState, useRef, useEffect, useCallback, useMemo } = React;

// ===== COMPONENTS =====

      e('thead',null,e('tr',null,props.headers.map(function(h,i){return e('th',{key:i},h)}))),

        e('h4',null,it.i+' '+it.t),

}

function TabSwitcher(props) {
  var _useState = React.useState(0), active = _useState[0], setActive = _useState[1];
  return e('div',{className:'tabs'},
    e('div',{className:'tab-bar'},props.tabs.map(function(t,i){
      return e('button',{key:i,className:'tab-btn'+(i===active?' active':''),onClick:function(){setActive(i)}},t.label);

    e('div',{className:'tab-content'},props.tabs.map(function(t,i){

function Accordion(props) {
  var _useState2 = React.useState(null), open = _useState2[0], setOpen = _useState2[1];

      e('div',{className:'acc-hdr',onClick:function(){setOpen(isOpen?null:i)}},
        it.title,
        e('span',{className:'arrow'+(isOpen?' open':'')},'\u25B6')

      e('div',{className:'acc-body'+(isOpen?' open':'')},
        it.lines.map(function(l,li){return e('p',{key:li},l)})
      )
    );
  }));
}

function MitreTech(props) {
  var t = props.tech, isSub = props.isSub;
  var cls = isSub ? 'mitre-sub' : 'mitre-tech';
  var url = t.url || 'https://attack.mitre.org/techniques/'+t.id.replace('.','/');
  function openUrl(e) {
    e.stopPropagation();
    window.open(url, '_blank', 'noopener');
  }
  return e('div',{className:cls,onClick:openUrl,title:'Click para ver en MITRE ATT&CK'},
    e('span',{className:'mitre-tid'},t.id),
    e('span',{className:'mitre-tname'},t.name),
    t.desc ? e('span',{className:'mitre-desc'},t.desc) : null

function MitreMatrix(props) {
  var tacs = props.tactics || [];
  return e('div',{className:'mitre-matrix'},
    tacs.map(function(t,i){
      var techs = t.techniques || [];
      var parents = techs.filter(function(x){return !x.is_sub});
      var subs = techs.filter(function(x){return x.is_sub});
      return e('div',{className:'mitre-col',key:i},
        e('div',{className:'mitre-col-hdr'},
          e('span',{className:'mitre-ta'},t.id),
          e('span',{className:'mitre-tn'},t.name)
        ),
        e('div',{className:'mitre-techs'},
          parents.map(function(pt,pi){
            return e(MitreTech,{key:'p'+pi,tech:pt,isSub:false});

        subs.length > 0 ? e('div',{className:'mitre-subs'},
          subs.map(function(st,si){
            return e(MitreTech,{key:'s'+si,tech:st,isSub:true});
          })

function renderContent(block, mitreMatrix) {
  switch(block.type) {
    case 'table': return e(TableView,{headers:block.h,rows:block.r});
    case 'grid': return e(GridView,{items:block.items});
    case 'code': return e(CodeBlock,{lang:block.lang,lines:block.lines});
    case 'callout': return e(Callout,{style:block.s,title:block.title,body:block.body});
    case 'tabs': return e(TabSwitcher,{tabs:block.tabs});
    case 'accordion': return e(Accordion,{items:block.items});
    case 'mitre': return e(MitreMatrix, {tactics: mitreMatrix});
    case 'sub': return e('div',{className:'subtitle'},block.title);
    default: return null;
  }

// ===== SECTION COMPONENT =====
function SectionCard(props) {
  var s = props.section, isOpen = props.isOpen, toggle = props.toggle, mitreMatrix = props.mitreMatrix;
  return e('div',{className:'section-card',id:s.id},
    e('div',{className:'section-hdr',onClick:function(){toggle(s.id)}},
      e('div',{className:'left'},
        e('span',{className:'icon'},s.icon),
        e('h2',null,s.title),
        s.badge ? e('span',{className:'badge'},s.badge) : null

      e('span',{className:'toggle'+(isOpen?' open':'')},'\u25BC')

    e('div',{className:'section-body'+(isOpen?' open':'')},
      s.desc ? e('div',{className:'section-intro'},e('p',null,s.desc)) : null,
      s.content ? s.content.map(function(b,i){return e(React.Fragment,{key:i},renderContent(b, mitreMatrix))}) : null
    )
  );
}

// ===== NAV GROUP =====

  var _useState3 = React.useState(true), open = _useState3[0], setOpen = _useState3[1];
  var g = props.group, active = props.active, onNav = props.onNav;
  return e('div',{className:'nav-group'},
    e('div',{className:'nav-grp-title',onClick:function(){setOpen(!open)}},
      g.t,
      e('span',{className:'arrow'+(open?' open':'')},'\u25B6')
    ),
    e('div',{className:'nav-items'+(open?' open':'')},
      g.items.map(function(item,i){
        return e('a',{key:i,className:'nav-link'+(active===item.id?' active':''),onClick:function(e){e.preventDefault();onNav(item.id)}},
          e('span',{className:'ico'},item.i),
          item.l
        );
      })
    )
  );
}

// ===== APP =====
function App() {
  // ── ALL hooks unconditionally (Rules of Hooks) ──
  var _a = React.useState(null), data = _a[0], setData = _a[1];
  var _b = React.useState(true), loading = _b[0], setLoading = _b[1];
  var _c = React.useState(null), error = _c[0], setError = _c[1];

  React.useEffect(function(){
    fetch("data/sections.json")
      .then(function(r){if(!r.ok) throw new Error("HTTP "+r.status); return r.json();})
      .then(function(d){ setData(d); setLoading(false); })
      .catch(function(e){ setError(e.message); setLoading(false); });
  },[]);

  var _d = React.useState(function(){
    try { return JSON.parse(localStorage.getItem('soc-guide-open')) || {triage:true,queries:true,cheat:true}; }
    catch(e) { return {triage:true,queries:true,cheat:true}; }
  }), openSections = _d[0], setOpenSections = _d[1];

  var _e = React.useState('triage'), activeSection = _e[0], setActive = _e[1];
  var _f = React.useState(false), sideOpen = _f[0], setSideOpen = _f[1];
  var _g = React.useState(''), searchQ = _g[0], setSearchQ = _g[1];

      if (e.key==='Escape') { setSearchQ(''); searchRef.current && searchRef.current.blur(); }
    }
    document.addEventListener('keydown',handler);
    return function(){document.removeEventListener('keydown',handler)};
  },[]);

  // Hooks that depend on data — must also be unconditional but guard inside
  var sections = data && data.sections ? data.sections : [];
  var navGroups = data && data.navGroups ? data.navGroups : [];

  function navigateTo(id) {
    setActive(id);
    setOpenSections(function(prev){
      if (!prev[id]) {
        var next = Object.assign({},prev);
        next[id] = true;
        localStorage.setItem('soc-guide-open',JSON.stringify(next));
        return next;
      }
      return prev;
    });
    setTimeout(function(){
      var el = document.getElementById(id);
      if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
    if (window.innerWidth <= 900) setSideOpen(false);
  }

  var mdPadding = {padding:'20px 0 10px',fontSize:'.72rem',color:'var(--text2)',textAlign:'center',borderTop:'1px solid var(--border)',marginTop:20};
  var bannerStyle = {
    background:'linear-gradient(135deg, rgba(74,158,255,.08) 0%, rgba(180,124,255,.06) 100%)',
    border:'1px solid var(--border)',
    borderRadius:'var(--radius)',
    padding:'20px 24px',
    marginBottom:'24px'
  };

  return [
    e('aside',{className:'sidebar'+(sideOpen?' open':''),key:'sidebar'},
      e('div',{className:'side-hdr'},e('h1',null,'\uD83D\uDEE1\uFE0F SOC Guide'),e('span',{className:'badge'},'v4.0')),
      e('div',{className:'side-search'},e('input',{ref:searchRef,type:'text',placeholder:'Buscar... (Ctrl+K)',value:searchQ,onChange:function(e){setSearchQ(e.target.value)}})),
      e('nav',{className:'nav'},navGroups.map(function(g,i){return e(NavGroup,{key:i,group:g,active:activeSection,onNav:navigateTo})}))
    ),
    e('div',{className:'overlay'+(sideOpen?' open':''),onClick:function(){setSideOpen(false)},key:'overlay'}),
    e('div',{className:'main',key:'main'},
      e('header',{className:'topbar'},
        e('button',{className:'menu-btn',onClick:function(){setSideOpen(!sideOpen)}},'\u2630'),
        e('div',{className:'bc'},e('span',{className:'dot'}),e('span',null,'Gu\u00EDa Interactiva del SOC Analyst')),
        e('div',{className:'stats'},e('span',null,'\uD83D\uDCDA '+sections.length+' secciones'))
      ),
      e('div',{className:'content'},
        !searchQ ? e('div',{style:bannerStyle},
          e('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},
            e('span',{style:{fontSize:'1.5rem'}},'\uD83D\uDEE1\uFE0F'),
            e('div',null,
              e('h3',{style:{fontSize:'1rem',fontWeight:600,marginBottom:2}},'SOC Analyst - Gu\u00EDa de Consulta R\u00E1pida'),
              e('p',{style:{fontSize:'.8rem',color:'var(--text2)'}},
                'Hac\u00E9 click en cualquier secci\u00F3n para expandir. Us\u00E1 Ctrl+K para buscar. C\u00F3digos copiables con un click.'
              )
            )
          )
        ) : null,
        searchQ ? e('div',{style:{marginBottom:16,fontSize:'.85rem',color:'var(--text2)'}},
          '\uD83D\uDD0E Resultados para "',e('strong',{style:{color:'var(--text)'}},searchQ),'": ',filtered.length,' secci\u00F3n(es)'
        ) : null,
        filtered.length > 0 ? filtered.map(function(s){
          var mtx = data.mitreMatrix || [];
          return e(SectionCard,{key:s.id,section:s,isOpen:!!openSections[s.id],toggle:toggleSection,mitreMatrix:mtx});
        }) : e('div',{style:{padding:40,textAlign:'center',color:'var(--text2)'}},
          e('p',{style:{fontSize:'1.5rem',marginBottom:8}},'\uD83D\uDD0D'),
          e('p',null,'No se encontraron resultados para "'+searchQ+'"'),
          e('p',{style:{fontSize:'.78rem',marginTop:4}},'Prob\u00E1 con: phishing, ransomware, KQL, EventID, MITRE, etc.')
        ),
        e('div',{style:mdPadding},'SOC Analyst Guide v4.0 - Hecho para consulta diaria.')
      )
    )
  ];
}

// ===== RENDER =====
var root = document.getElementById('root');
try {
  ReactDOM.createRoot(root).render(e(App));
} catch(err) {
  root.innerHTML = '<div style="padding:40px;background:#080c14;color:#f0605a;font-family:monospace;min-height:100vh">' +
    '<h2 style="color:#f0605a">\u26A0\uFE0F Error: '+err.message+'</h2>' +
    '<pre style="color:#8b9db0;margin-top:12px">'+err.stack+'</pre></div>';
}

</script>
</body>
</html>
