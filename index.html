<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Analyst — Guía Interactiva</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#080c14;
    --bg2:#0f1624;
    --bg3:#172236;
    --bg4:#1e2d42;
    --border:#1e3050;
    --text:#d0d9e8;
    --text2:#6a7f9e;
    --accent:#4a9eff;
    --green:#3dd68c;
    --yellow:#e8b339;
    --red:#f0605a;
    --purple:#b47cff;
    --cyan:#3dd6d0;
    --orange:#e88a3a;
    --pink:#f07aaa;
    --radius:10px;
    --side:270px;
    --font:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  html{scroll-behavior:smooth;font-size:15px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
  #root{display:flex;min-height:100vh}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--side);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:100;transition:transform .25s cubic-bezier(.4,0,.2,1)}
  .side-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:2}
  .side-hdr h1{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .side-hdr .badge{font-size:.55rem;background:var(--bg4);color:var(--text2);padding:2px 7px;border-radius:4px;font-weight:600;-webkit-text-fill-color:var(--text2)}
  .side-search{padding:10px 12px;border-bottom:1px solid var(--border)}
  .side-search input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.8rem;outline:none;transition:border-color .2s}
  .side-search input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,158,255,.15)}
  .side-search input::placeholder{color:var(--text2)}

  .nav-grp-title{padding:10px 16px 4px 18px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color .2s}
  .nav-grp-title:hover{color:var(--text)}
  .nav-grp-title .arrow{font-size:.5rem;transition:transform .2s;color:var(--text2)}
  .nav-grp-title .arrow.open{transform:rotate(90deg)}
  .nav-items{overflow:hidden;max-height:0;transition:max-height .3s ease}
  .nav-items.open{max-height:800px}
  .nav-link{display:flex;align-items:center;padding:5px 16px 5px 22px;font-size:.8rem;color:var(--text2);text-decoration:none;border-left:2px solid transparent;transition:all .12s;cursor:pointer}
  .nav-link:hover{color:var(--text);background:var(--bg3)}
  .nav-link.active{color:var(--accent);border-left-color:var(--accent);background:rgba(74,158,255,.07)}
  .nav-link .ico{margin-right:7px;width:16px;text-align:center;font-size:.75rem}

  .main{margin-left:var(--side);flex:1;min-height:100vh;max-width:100%}
  .topbar{position:sticky;top:0;height:50px;background:rgba(8,12,20,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;z-index:50;gap:14px}
  .topbar .menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.25rem;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s}
  .topbar .menu-btn:hover{background:var(--bg3)}
  .topbar .bc{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:6px}
  .topbar .bc span{color:var(--text)}.topbar .bc .dot{width:4px;height:4px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .topbar .stats{display:flex;gap:14px;margin-left:auto;font-size:.72rem;color:var(--text2)}
  .topbar .stats span{display:flex;align-items:center;gap:4px}

  .content{padding:24px 32px;max-width:1100px}
  @media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.topbar .menu-btn{display:block}.content{padding:16px}.topbar .stats{display:none}}

  .section-card{margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;scroll-margin-top:65px}
  .section-card:hover{border-color:var(--bg4)}
  .section-hdr{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background .15s;gap:12px}
  .section-hdr:hover{background:var(--bg3)}
  .section-hdr .left{display:flex;align-items:center;gap:10px}
  .section-hdr .left .icon{font-size:1.2rem}
  .section-hdr h2{font-size:1.05rem;font-weight:600;color:var(--text)}
  .section-hdr .badge{font-size:.62rem;background:var(--bg4);color:var(--text2);padding:2px 9px;border-radius:10px;font-weight:500}
  .section-hdr .toggle{color:var(--text2);font-size:.8rem;transition:transform .25s;flex-shrink:0}
  .section-hdr .toggle.open{transform:rotate(180deg)}
  .section-body{padding:0 20px 20px;display:none}
  .section-body.open{display:block;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

  .section-intro{margin-bottom:16px}
  .section-intro p{color:var(--text2);font-size:.85rem;max-width:750px;line-height:1.55}

  .grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:12px 0}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:12px 0}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:12px 0}

  .metric-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;transition:all .2s;cursor:default}
  .metric-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .metric-card .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:4px}
  .metric-card .value{font-size:1.6rem;font-weight:700;color:var(--text);font-family:var(--mono)}
  .metric-card .sub{font-size:.72rem;color:var(--text2);margin-top:4px}
  .metric-card .bar{height:3px;border-radius:2px;margin-top:10px;transition:width 1s ease}
  .metric-card .bar.b-blue{background:linear-gradient(90deg,var(--accent),var(--purple))}
  .metric-card .bar.b-green{background:linear-gradient(90deg,var(--green),var(--cyan))}
  .metric-card .bar.b-yellow{background:linear-gradient(90deg,var(--yellow),var(--orange))}
  .metric-card .bar.b-red{background:linear-gradient(90deg,var(--red),var(--orange))}

  .info-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s}
  .info-card:hover{border-color:var(--bg4);transform:translateY(-1px)}
  .info-card h4{font-size:.85rem;margin-bottom:5px;color:var(--text);display:flex;align-items:center;gap:6px}
  .info-card p{font-size:.78rem;color:var(--text2);line-height:1.5}
  .info-card .tags{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}

  .tag{display:inline-block;font-size:.62rem;padding:2px 8px;border-radius:4px;font-weight:500}
  .t-b{background:rgba(74,158,255,.14);color:var(--accent)}
  .t-g{background:rgba(61,214,140,.14);color:var(--green)}
  .t-y{background:rgba(232,179,57,.14);color:var(--yellow)}
  .t-r{background:rgba(240,96,90,.14);color:var(--red)}
  .t-p{background:rgba(180,124,255,.14);color:var(--purple)}
  .t-o{background:rgba(232,138,58,.14);color:var(--orange)}
  .t-c{background:rgba(61,214,208,.14);color:var(--cyan)}

  .cw{overflow-x:auto;margin:10px 0;border:1px solid var(--border);border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;font-size:.78rem}
  thead{background:var(--bg3)}
  th{padding:8px 12px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--bg3)}

  pre{background:#050a12;border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:.77rem;line-height:1.55;margin:10px 0;position:relative;cursor:pointer;transition:border-color .2s}
  pre:hover{border-color:var(--text2)}
  pre .lb{position:absolute;top:5px;right:9px;font-size:.58rem;color:var(--text2);font-family:var(--font);text-transform:uppercase;opacity:.5;pointer-events:none}
  code{font-family:var(--mono);font-size:.82em;background:rgba(74,158,255,.08);padding:1px 5px;border-radius:3px;color:var(--accent)}
  pre code{background:none;padding:0;border-radius:0;color:#b4c7e0;font-size:.77rem}
  .kw{color:var(--purple)}.str{color:var(--green)}.cm{color:#4a5a78;font-style:italic}.fn{color:var(--cyan)}.num{color:var(--yellow)}.op{color:var(--red)}.tp{color:var(--accent)}

  .callout{border-radius:8px;padding:14px 18px;margin:14px 0;border-left:3px solid;font-size:.82rem}
  .callout-i{background:rgba(74,158,255,.07);border-color:var(--accent)}
  .callout-w{background:rgba(232,179,57,.07);border-color:var(--yellow)}
  .callout-d{background:rgba(240,96,90,.07);border-color:var(--red)}
  .callout-g{background:rgba(61,214,140,.07);border-color:var(--green)}
  .callout strong{display:block;margin-bottom:3px;font-size:.85rem}

  .tabs{margin:10px 0}
  .tab-bar{display:flex;gap:2px;background:var(--bg);padding:4px;border-radius:6px;border:1px solid var(--border);overflow-x:auto}
  .tab-btn{padding:6px 14px;font-size:.75rem;font-weight:500;border:none;border-radius:4px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap;font-family:var(--font)}
  .tab-btn:hover{color:var(--text);background:var(--bg3)}
  .tab-btn.active{background:var(--accent);color:#fff}
  .tab-content{margin-top:0}
  .tab-pane{display:none}
  .tab-pane.active{display:block;animation:fadeIn .2s ease}

  .pill{display:inline-block;padding:1px 9px;border-radius:10px;font-size:.68rem;font-weight:500}
  .p-c{background:rgba(240,96,90,.18);color:var(--red)}
  .p-h{background:rgba(232,179,57,.18);color:var(--yellow)}
  .p-m{background:rgba(74,158,255,.12);color:var(--accent)}
  .p-l{background:rgba(106,127,158,.14);color:var(--text2)}

  .hl{background:rgba(232,179,57,.25);padding:0 2px;border-radius:2px}

  .chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;margin:12px 0;max-width:500px}
  .chart-wrap h4{font-size:.8rem;color:var(--text2);margin-bottom:8px;text-align:center}

  .mitre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;margin:12px 0}
  .mitre-cell{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 4px;text-align:center;font-size:.68rem;line-height:1.3;transition:all .15s;cursor:default}
  .mitre-cell:hover{border-color:var(--accent);transform:scale(1.04);z-index:1;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .mitre-cell .tac{color:var(--accent);font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.02em}
  .mitre-cell .t{color:var(--text2);font-size:.6rem;margin-top:1px}

  .timeline{position:relative;padding-left:22px;margin:12px 0}
  .timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--border)}
  .tl-item{position:relative;margin-bottom:16px;animation:fadeIn .3s ease}
  .tl-item::before{content:'';position:absolute;left:-19px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2)}
  .tl-item .step{font-weight:600;color:var(--accent);font-size:.8rem}
  .tl-item p{color:var(--text2);font-size:.8rem;margin-top:2px}

  .accordion{margin:8px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .acc-hdr{padding:10px 14px;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;font-size:.82rem;font-weight:500;color:var(--text)}
  .acc-hdr:hover{background:var(--bg4)}
  .acc-hdr .arrow{transition:transform .2s;font-size:.7rem;color:var(--text2)}
  .acc-hdr .arrow.open{transform:rotate(90deg)}
  .acc-body{padding:0 14px;max-height:0;overflow:hidden;transition:all .25s ease}
  .acc-body.open{padding:12px 14px;max-height:2000px}
  .acc-body p{font-size:.78rem;color:var(--text2)}

  .glow-text{color:var(--accent);text-shadow:0 0 20px rgba(74,158,255,.15)}

  .subtitle{margin:18px 0 8px;font-size:.9rem;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}

  .empty-state{padding:30px;text-align:center;color:var(--text2);font-size:.85rem}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
  .overlay.open{display:block}
</style>
</head>
<body><div id="root"></div>

<script type="text/babel" data-type="module">
const { createContext, useContext, useState, useRef, useEffect, useCallback, useMemo } = React;

const sections = [
  { id:'triage', icon:'🔍', title:'Triage de Alertas', badge:'5 pasos',
    desc:'Proceso de clasificación, priorización y escalado de alertas. Cada paso debe tomar < 2 minutos.',
    content:[
      { type:'table',
        headers:['#','Paso','Acción','Pregunta clave'],
        rows:[
          ['1','Validar','Revisar timestamp, fuente, tipo de evento','¿Es un evento real o error de parsing?'],
          ['2','Clasificar','Tipo: malware, phishing, acceso no autorizado, DDoS, policy violation','¿Qué categoría de ataque?'],
          ['3','Priorizar','Criticidad del activo × tipo de amenaza × evidencia','¿A quién afecta y qué tan grave es?'],
          ['4','Contener','Si riesgo alto: aislar host, bloquear IP, suspender usuario','¿Puedo contener sin escalar?'],
          ['5','Escalar/Cerrar','Con evidencia → L2. Falso positivo → documentar y cerrar','¿Necesito más recursos?']
        ]},
      { type:'callout', style:'w', title:'💡 En triage', body:'cada alerta es una hipótesis. Tu trabajo es juntar evidencia para probarla o descartarla. Si no hay evidencia suficiente en 5 min, escalá.' }
    ]},
  { id:'severidad', icon:'🏷️', title:'Matriz de Severidad', badge:'Clasificación',
    desc:'Clasificación estándar para priorizar alertas según activo y evidencia.',
    content:[
      { type:'table',
        headers:['Severidad','Activo','Evidencia','Ejemplo','Acción'],
        rows:[
          ['CRITICAL','Crítico (DC, SQL, ERP)','Sólida','Ransomware en DC','Contener YA, escalar a IR'],
          ['HIGH','Importante','Moderada-Fuerte','Lateral movement, C2','Aislar, escalar urgente'],
          ['MEDIUM','Estándar','Parcial','Binary desde temp','Investigar en 24h'],
          ['LOW','Bajo','Débil','Login IP inusual','Ticket, revisión semanal']
        ]},
      { type:'callout', style:'i', title:'📌 Decisión rápida', body:'Activo crítico + evidencia fuerte = CRITICAL. Activo crítico + evidencia débil = HIGH. Activo normal + evidencia fuerte = HIGH. Activo normal + evidencia débil = MEDIUM.' }
    ]},
  { id:'evtx', icon:'📋', title:'Windows EventLogs Clave', badge:'15 EventIDs',
    desc:'EventIDs que TODO SOC Analyst debe reconocer al instante.',
    content:[
      { type:'table',
        headers:['EventID','Nombre','Qué detecta','Riesgo'],
        rows:[
          ['4624','Logon Success','Login fuera de horario, IP externa','Ver contexto'],
          ['4625','Logon Failure','Password spraying, brute force','Media'],
          ['4672','Admin Logon','Privilegios asignados (SeDebug, SeTakeOwnership)','Alta'],
          ['4688','Process Creation','LOLBins, child process de Office','Crítica'],
          ['4698','Scheduled Task','Creación de tarea (persistencia)','Alta'],
          ['4719','Audit Policy Change','Atacante desactivando logging','Crítica'],
          ['4720','User Created','Creación de cuenta nueva','Alta'],
          ['4728','Group Member Added','Usuario agregado a Admin/Enterprise Admin','Crítica'],
          ['4104','PS ScriptBlock','Script malicioso, ofuscación, download cradle','Crítica'],
          ['5156','WFP Connection','Conexión saliente a IP sospechosa (C2)','Alta'],
          ['7045','Service Installed','Instalación de servicio (persistencia)','Alta']
        ]}
    ]},
  { id:'sysmon', icon:'📡', title:'Sysmon Events', badge:'10 EventIDs',
    desc:'Sysmon — el mejor amigo del SOC Analyst.',
    content:[
      { type:'table',
        headers:['EventID','Nombre','Uso','Riesgo'],
        rows:[
          ['1','Process Create','Línea de comandos completa de cada proceso','Crítica'],
          ['3','Network Connect','Conexión de red por proceso','Crítica'],
          ['7','Image Load','DLL cargada (detecta DLL hijacking)','Alta'],
          ['8','CreateRemoteThread','Inyección de hilo en otro proceso','Crítica'],
          ['10','Process Access','Acceso a LSASS (Mimikatz)','Crítica'],
          ['11','File Create','Archivos en directorios sospechosos','Alta'],
          ['12-14','Registry Events','Modificación de Run keys, servicios','Alta'],
          ['15','File Stream','Alternate Data Stream (ADS)','Alta'],
          ['17-18','Pipe Events','Named pipes (C2, lateral movement)','Media'],
          ['22','DNS Query','Consulta DNS desde el host','Alta']
        ]}
    ]},
  { id:'win-cmd', icon:'💻', title:'Comandos Forense Windows', badge:'PowerShell',
    desc:'Comandos para ejecutar en caliente durante una investigación.',
    content:[
      { type:'code', lang:'powershell', lines:[
        '# Procesos con conexiones de red activas',
        'Get-NetTCPConnection | Where-Object State -eq Established',
        '',
        '# Scheduled tasks no-Microsoft',
        'Get-ScheduledTask | Where-Object TaskPath -notlike "\\Microsoft\\*"',
        '',
        '# Servicios con paths raros (temp/users/appdata)',
        'Get-CimInstance Win32_Service | Where-Object PathName -match "(temp|users|appdata)"',
        '',
        '# Run keys — persistencia',
        'Get-ItemProperty -Path "HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run"',
        'Get-ItemProperty -Path "HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run"',
        '',
        '# Procesos hijos de Explorer',
        'Get-CimInstance Win32_Process | Where-Object ParentProcessId -eq (Get-Process explorer).Id',
        '',
        '# Logins remotos RDP (LogonType 10)',
        'Get-WinEvent -FilterHashtable @{LogName="Security";ID=4624;LogonType=10} | Format-Table TimeCreated,Properties[5],Properties[18]',
        '',
        '# Eventos de proceso en últimas 24h',
        'Get-WinEvent -FilterHashtable @{LogName="Security";ID=4688;StartTime=(Get-Date).AddHours(-24)}'
      ]}
    ]},
  { id:'lolbins', icon:'⚡', title:'Living Off the Land Binaries', badge:'LOLBins',
    desc:'Binarios legítimos de Windows usados por atacantes para evadir detección.',
    content:[
      { type:'table',
        headers:['Binario','Uso malicioso','Qué monitorear'],
        rows:[
          ['powershell.exe','Download cradle, ofuscación -enc','4104 ScriptBlock, líneas con -enc / IEX / DownloadString'],
          ['rundll32.exe','Cargar DLL, ejecutar JavaScript','Child process sin parent Office. Conexiones de red.'],
          ['regsvr32.exe','Ejecutar .sct (Squiblydoo)','regsvr32 /s /n /u /i: con argumento URL'],
          ['mshta.exe','Ejecutar HTA malicioso','Mshta.exe desde temp/downloads'],
          ['certutil.exe','Descargar payloads, decode base64','certutil -urlcache -f, certutil -decode'],
          ['wmic.exe','Ejecución remota de procesos','wmic process call create'],
          ['cscript.exe','Ejecutar VBScript/JScript','Script files en %TEMP% / %APPDATA%'],
          ['bitsadmin.exe','Descarga via BITS','bitsadmin /transfer a dominio externo']
        ]},
      { type:'callout', style:'d', title:'⚠️ Regla', body:'CUALQUIER ejecución de estos binarios desde %TEMP%, %APPDATA% o %USERPROFILE% merece investigación inmediata.' }
    ]},
  { id:'linux-cmd', icon:'🐧', title:'Comandos Forense Linux', badge:'Bash',
    desc:'Para investigación en caliente de endpoints Linux.',
    content:[
      { type:'code', lang:'bash', lines:[
        '# Procesos ocultos (diferencia entre ps y /proc)',
        'ps auxf',
        'ls -la /proc/*/exe 2>/dev/null | grep -E "(deleted|tmp|dev/shm)"',
        '',
        '# Módulos de kernel (rootkits)',
        'lsmod | sort',
        '',
        '# Archivos modificados últimas 24h (excluyendo sistema)',
        'find / -xdev -mtime -1 -type f -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null',
        '',
        '# Persistencia via cron',
        'ls -la /etc/cron* /var/spool/cron/crontabs/',
        '',
        '# Conexiones de red activas',

const CodeBlock = ({ lang, lines }) => {
  const [copied, setCopied] = useState(false);
  const text = lines.join('\n');
  const handleCopy = () => { navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1200)}) };
  return (
    <pre onClick={handleCopy} title="Click para copiar">
      <span className="lb">{copied ? '✓ Copiado' : lang}</span>
      <code>{lines.map((l,i)=>(
        <React.Fragment key={i}>
          {l.startsWith('#') || l.startsWith('//') || l.startsWith('|') && !l.startsWith('| ') ? (
            <span className="cm">{l}</span>
          ) : l.startsWith('| ') ? (
            <span className="op">{l}</span>
          ) : l.match(/^(let|where|project|summarize|sort|extend|partition|eval|eventstats|stats|table|index|bucket|FROM|STAT|SORT|GET)/) ? (
            <span className="kw">{l}</span>
          ) : l.match(/^[a-z]/) && l.includes(' ') ? (
            <><span className="fn">{l.split(' ')[0]}</span>{l.substring(l.indexOf(' '))}</>
          ) : <>{l}</>
          }{'\n'}
        </React.Fragment>
      ))}</code>
    </pre>
  );
};

      <div className="tab-content">
        {tabs.map((t,i)=>(
          <div key={i} className={`tab-pane ${i===active?'active':''}`}>
            <CodeBlock lang={t.lang} lines={t.lines} />
          </div>
        ))}
      </div>
    </div>
  );
};

const AccordionGroup = ({ items }) => {
  const [open, setOpen] = useState(null);
  const toggle = (i) => setOpen(open===i ? null : i);
  return (
    <div>
      {items.map((it,i)=>(
        <div className="accordion" key={i}>
          <div className="acc-hdr" onClick={()=>toggle(i)}>
            {it.title}
            <span className={`arrow ${open===i?'open':''}`}>▶</span>
          </div>
          <div className={`acc-body ${open===i?'open':''}`}>
            {it.lines.map((l,li)=><p key={li}>{l}</p>)}
          </div>
        </div>
      ))}
    </div>
  );
};

const MitreMatrix = () => {
  const tactics = [
    {id:'TA0043',name:'Recon'},{id:'TA0042',name:'Resource Dev'},{id:'TA0001',name:'Initial Access'},
    {id:'TA0002',name:'Execution'},{id:'TA0003',name:'Persistence'},{id:'TA0004',name:'Priv Esc'},
    {id:'TA0005',name:'Defense Evasion'},{id:'TA0006',name:'Cred Access'},{id:'TA0007',name:'Discovery'},
    {id:'TA0008',name:'Lateral Mov'},{id:'TA0009',name:'Collection'},{id:'TA0011',name:'C2'},
    {id:'TA0010',name:'Exfil'},{id:'TA0040',name:'Impact'}
  ];
  return (
    <>
      <div className="mitre-grid">
        {tactics.map((t,i)=>(
          <div className="mitre-cell" key={i} title={t.id}>
            <div className="tac">{t.name}</div>
            <div className="t">{t.id}</div>
          </div>
        ))}
      </div>
      <Callout style='i' title='🧭 ATT&CK Navigator' body={<><a href="https://mitre-attack.github.io/attack-navigator/" target="_blank" style={{color:'var(--accent)'}}>mitre-attack.github.io/attack-navigator</a> — creá heatmaps de cobertura de detección.</>} />
    </>
  );
};

// ---- SECTION CONTENT RENDERER ----
const renderContent = (content) => {
  if (!content) return null;
  return content.map((block, i) => {
    switch(block.type) {
      case 'table': return <TableView key={i} headers={block.headers} rows={block.rows} />;
      case 'grid': return <GridView key={i} items={block.items} />;
      case 'code': return <CodeBlock key={i} lang={block.lang} lines={block.lines} />;
      case 'callout': return <Callout key={i} style={block.style} title={block.title} body={block.body} />;
      case 'tabs': return <TabSwitcher key={i} tabs={block.tabs} />;
      case 'accordion': return <AccordionGroup key={i} items={block.items} />;
      case 'mitre': return <MitreMatrix key={i} />;
      case 'sub': return <div key={i} className="subtitle">{block.title}</div>;
      default: return null;
    }
  });
};

// ---- SECTION CARD ----
const SectionCard = ({ section, isOpen, toggle }) => (
  <div className="section-card" id={section.id}>
    <div className="section-hdr" onClick={()=>toggle(section.id)}>
      <div className="left">
        <span className="icon">{section.icon}</span>
        <h2>{section.title}</h2>
        {section.badge && <span className="badge">{section.badge}</span>}
      </div>
      <span className={`toggle ${isOpen?'open':''}`}>▼</span>
    </div>
    <div className={`section-body ${isOpen?'open':''}`}>
      {section.desc && <div className="section-intro"><p>{section.desc}</p></div>}
      {renderContent(section.content)}
    </div>
  </div>
);

// ---- NAV GROUP ----
const NavGroup = ({ group, activeSection, onNav }) => {
  const [open, setOpen] = useState(true);
  return (
    <div className="nav-group">
      <div className="nav-grp-title" onClick={()=>setOpen(!open)}>
        {group.title}
        <span className={`arrow ${open?'open':''}`}>▶</span>
      </div>
      <div className={`nav-items ${open?'open':''}`}>
        {group.items.map((item,i)=>(
          <a key={i} className={`nav-link ${activeSection===item.id?'active':''}`} data-target={item.id} onClick={(e)=>{e.preventDefault();onNav(item.id)}}>
            <span className="ico">{item.icon}</span>
            {item.label}
          </a>
        ))}
      </div>
    </div>
  );
};

// ---- APP ----
const App = () => {
  const [openSections, setOpenSections] = useState(()=>{
    const saved = localStorage.getItem('soc-guide-open');
    if (saved) try { return JSON.parse(saved) } catch(e) {}
    return { triage:true, queries:true, cheat:true };
  });
  const [activeSection, setActiveSection] = useState('triage');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const searchRef = useRef(null);
  const sectionRefs = useRef({});

  // Keyboard shortcuts
  useEffect(()=>{
    const handler = (e) => {
      if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); searchRef.current?.focus(); }
      if (e.key==='Escape') { setSearchQuery(''); searchRef.current?.blur(); }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  const toggleSection = useCallback((id) => {
    setOpenSections(prev => {
      const next = { ...prev, [id]: !prev[id] };
      localStorage.setItem('soc-guide-open', JSON.stringify(next));
      return next;
    });
  }, []);

  const navigateTo = useCallback((id) => {
    setActiveSection(id);
    setOpenSections(prev => {
      if (!prev[id]) {
        const next = { ...prev, [id]: true };
        localStorage.setItem('soc-guide-open', JSON.stringify(next));
        return next;
      }
      return prev;
    });
    setTimeout(() => {
      document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 50);
    if (window.innerWidth <= 900) setSidebarOpen(false);
  }, []);

  // Scroll spy
  useEffect(()=>{
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{if(e.isIntersecting) setActiveSection(e.target.id)});
    }, { rootMargin:'-80px 0px -70% 0px' });
    sections.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  // Search
  const filtered = useMemo(() => {
    if (!searchQuery.trim()) return sections;
    const q = searchQuery.toLowerCase().trim();
    return sections.filter(s =>
      s.title.toLowerCase().includes(q) ||
      (s.badge && s.badge.toLowerCase().includes(q)) ||
      (s.desc && s.desc.toLowerCase().includes(q)) ||
      JSON.stringify(s.content).toLowerCase().includes(q)
    );
  }, [searchQuery]);

  return (
    <>
      {/* Sidebar */}
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="side-hdr">
          <h1>🛡️ SOC Guide</h1>
          <span className="badge">v3.0</span>
        </div>
        <div className="side-search">
          <input ref={searchRef} type="text" placeholder="Buscar… (Ctrl+K)"
            value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
        </div>
        <nav className="nav">
          {navGroups.map((g,i)=><NavGroup key={i} group={g} activeSection={activeSection} onNav={navigateTo} />)}
        </nav>
      </aside>
      <div className={`overlay ${sidebarOpen?'open':''}`} onClick={()=>setSidebarOpen(false)} />

      {/* Main */}
      <div className="main">
        <header className="topbar">
          <button className="menu-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>☰</button>
          <div className="bc">
            <span className="dot"></span>
            <span>Guía Interactiva del SOC Analyst</span>
          </div>
          <div className="stats">
            <span>📚 {sections.length} secciones</span>
            <span>⚡ {openSections[Object.keys(openSections).find(k=>openSections[k])] ? 'Interactivo' : 'Explorá'}</span>
          </div>
        </header>

        <div className="content">
          {/* Welcome Banner */}
          {!searchQuery && (
            <div style={{
              background:'linear-gradient(135deg, rgba(74,158,255,.08) 0%, rgba(180,124,255,.06) 100%)',
              border:'1px solid var(--border)',
              borderRadius:'var(--radius)',
              padding:'20px 24px',
              marginBottom:'24px'
            }}>
              <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
                <span style={{fontSize:'1.5rem'}}>🛡️</span>
                <div>
                  <h3 style={{fontSize:'1rem',fontWeight:600,marginBottom:2}}>
                    SOC Analyst — Guía de Consulta Rápida
                  </h3>
                  <p style={{fontSize:'.8rem',color:'var(--text2)'}}>
                    Hacé click en cualquier sección para expandir. Usá <kbd style={{background:'var(--bg4)',padding:'1px 6px',borderRadius:3,fontSize:'.7rem'}}>Ctrl+K</kbd> para buscar.
                    Cada tarjeta tiene tablas, comandos y queries listos para copiar.
                  </p>
                </div>
              </div>
            </div>
          )}

          {searchQuery && (
            <div style={{marginBottom:16,fontSize:'.85rem',color:'var(--text2)'}}>
              🔍 Resultados para "<strong style={{color:'var(--text)'}}>{searchQuery}</strong>":
              {filtered.length === 0 ? ' sin resultados' : ` ${filtered.length} sección(es)`}
            </div>
          )}

          {filtered.map(s => (
            <SectionCard key={s.id} section={s}
              isOpen={openSections[s.id] || false}
              toggle={toggleSection} />
          ))}

          {filtered.length === 0 && (
            <div className="empty-state">
              <div style={{fontSize:'2rem',marginBottom:8}}>🔍</div>
              <p>No se encontraron resultados para "{searchQuery}"</p>
              <p style={{fontSize:'.78rem',marginTop:4}}>Probá con: phishing, ransomware, KQL, EventID, MITRE, etc.</p>
            </div>
          )}

          <div style={{textAlign:'center',padding:'20px 0 10px',fontSize:'.72rem',color:'var(--text2)',borderTop:'1px solid var(--border)',marginTop:20}}>
            SOC Analyst Guide v3.0 — Hecho para consulta diaria. Todas las queries y comandos son copiables con un click.
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
