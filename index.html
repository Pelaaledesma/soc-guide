<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Guide — blue team field manual</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#050b18;
    --bg2:#0c1528;
    --bg3:#111e38;
    --bg4:#182847;
    --border:rgba(0,212,255,.1);
    --text:#e1e9f5;
    --text2:#7a8fae;
    --accent:#00d4ff;
    --accent2:#4a9eff;
    --green:#22c55e;
    --yellow:#f59e0b;
    --red:#ef4444;
    --purple:#8b5cf6;
    --cyan:#06b6d4;
    --orange:#f97316;
    --glow:0 0 20px rgba(0,212,255,.08);
    --glow-h:0 0 30px rgba(0,212,255,.15);
    --radius:12px;
    --side:260px;
    --font:'DM Sans','Inter','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  }
  html{scroll-behavior:smooth;font-size:15px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(0,212,255,.03),transparent);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.015) 2px,rgba(0,212,255,.015) 4px);pointer-events:none;z-index:0}
  #root{display:flex;min-height:100vh;position:relative;z-index:1}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  ::selection{background:rgba(0,212,255,.25);color:var(--text)}

  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--side);background:rgba(12,21,40,.92);backdrop-filter:blur(20px);border-right:1px solid var(--border);overflow-y:auto;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .side-hdr{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:inherit;backdrop-filter:inherit;z-index:2}
  .side-hdr h1{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#00d4ff,#4a9eff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em}
  .side-hdr .badge{font-size:.5rem;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.04em}
  .side-search{padding:10px 12px;border-bottom:1px solid var(--border)}
  .side-search input{width:100%;padding:9px 12px;background:rgba(5,11,24,.6);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;outline:none;transition:all .2s;font-family:var(--font)}
  .side-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1),0 0 15px rgba(0,212,255,.05)}
  .side-search input::placeholder{color:var(--text2);opacity:.6}
  .nav-grp-title{padding:12px 16px 4px 18px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;opacity:.7;transition:opacity .15s}
  .nav-grp-title:hover{opacity:1;color:var(--text)}
  .nav-grp-title .arrow{font-size:.5rem;transition:transform .2s;color:inherit}
  .nav-grp-title .arrow.open{transform:rotate(90deg)}
  .nav-items{overflow:hidden;max-height:0;transition:max-height .25s ease}
  .nav-items.open{max-height:800px}
  .nav-link{display:flex;align-items:center;padding:6px 16px 6px 22px;font-size:.8rem;color:var(--text2);text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer;position:relative}
  .nav-link:hover{color:var(--text);background:rgba(0,212,255,.04)}
  .nav-link.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,212,255,.06)}
  .nav-link.active::after{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);box-shadow:0 0 8px var(--accent);border-radius:1px}
  .nav-link .ico{margin-right:8px;width:16px;text-align:center;font-size:.75rem;filter:saturate(.8)}

  .main{margin-left:var(--side);flex:1;min-height:100vh;max-width:100%;position:relative}
  .main::before{content:'';position:fixed;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(0,212,255,.08),transparent);pointer-events:none}
  .topbar{position:sticky;top:0;height:50px;background:rgba(5,11,24,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;z-index:50;gap:14px}
  .topbar .menu-btn{display:none;background:none;border:none;color:var(--text);font-size:1.25rem;cursor:pointer;padding:4px;border-radius:6px}
  .topbar .menu-btn:hover{background:rgba(0,212,255,.08)}
  .topbar .bc{font-size:.78rem;color:var(--text2);display:flex;align-items:center;gap:8px}
  .topbar .bc span{color:var(--text)}
  .topbar .bc .dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 6px var(--green)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
  .topbar .stats{display:flex;gap:14px;margin-left:auto;font-size:.72rem;color:var(--text2)}
  .topbar .stats span{display:flex;align-items:center;gap:4px}

  .content{padding:28px 36px;max-width:1100px;position:relative}
  .content::before{content:'⚠️ este no es otro template de IA';position:fixed;bottom:12px;right:20px;font-size:.55rem;color:var(--text2);opacity:.15;letter-spacing:.02em;pointer-events:none;z-index:0}
  @media(max-width:900px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
    .main{margin-left:0}.topbar .menu-btn{display:block}.content{padding:16px}.topbar .stats{display:none}
    .content::before{display:none}
  }

  .section-card{margin-bottom:24px;background:rgba(12,21,40,.6);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;scroll-margin-top:65px;transition:border-color .25s,box-shadow .25s}
  .section-card:hover{border-color:rgba(0,212,255,.2);box-shadow:var(--glow)}
  .section-hdr{padding:18px 22px;display:flex;align-items:center;gap:14px;position:relative}
  .section-hdr::after{content:'';position:absolute;bottom:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.06),transparent)}
  .section-hdr .left{display:flex;align-items:center;gap:11px}
  .section-hdr .left .icon{font-size:1.25rem;filter:saturate(.9)}
  .section-hdr h2{font-size:1.05rem;font-weight:600;color:var(--text);letter-spacing:-.01em}
  .section-hdr .badge{font-size:.58rem;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.12);color:var(--accent);padding:2px 10px;border-radius:6px;font-weight:500;letter-spacing:.02em}
  .section-body{padding:0 22px 22px;display:block}
  .section-intro{margin-bottom:18px}.section-intro p{color:var(--text2);font-size:.82rem;max-width:750px;line-height:1.6}
  .subtitle{font-size:.82rem;font-weight:600;color:var(--accent);margin:18px 0 8px;padding:0 0 4px;border-bottom:1px solid rgba(0,212,255,.08);letter-spacing:.02em}

  .search-hit{display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(12,21,40,.6);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:all .2s}
  .search-hit:hover{border-color:rgba(0,212,255,.25);box-shadow:var(--glow);background:rgba(12,21,40,.8)}
  .search-hit-icon{font-size:1.3rem}
  .search-hit-title{font-size:.9rem;font-weight:500;color:var(--text)}
  .search-hit-desc{font-size:.75rem;color:var(--text2);margin-top:3px}

  .grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:12px 0}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:12px 0}
  .info-card{background:rgba(17,30,56,.5);border:1px solid var(--border);border-radius:10px;padding:16px;transition:border-color .2s,box-shadow .2s}
  .info-card:hover{border-color:rgba(0,212,255,.15);box-shadow:var(--glow)}
  .info-card h4{font-size:.85rem;margin-bottom:6px;color:var(--text);display:flex;align-items:center;gap:7px}
  .info-card p{font-size:.75rem;color:var(--text2);line-height:1.55}
  .info-card .tags{margin-top:10px;display:flex;gap:4px;flex-wrap:wrap}
  .tag{display:inline-block;font-size:.6rem;padding:2px 8px;border-radius:4px;font-weight:500}
  .t-b{background:rgba(0,212,255,.1);color:var(--accent)}.t-g{background:rgba(34,197,94,.1);color:var(--green)}
  .t-y{background:rgba(245,158,11,.1);color:var(--yellow)}.t-r{background:rgba(239,68,68,.1);color:var(--red)}
  .t-p{background:rgba(139,92,246,.1);color:var(--purple)}.t-o{background:rgba(249,115,22,.1);color:var(--orange)}
  .cw{overflow-x:auto;margin:12px 0;border:1px solid var(--border);border-radius:var(--radius)}
  table{width:100%;border-collapse:collapse;font-size:.76rem}
  thead{background:rgba(17,30,56,.5)}
  th{padding:9px 14px;text-align:left;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
  td{padding:9px 14px;border-bottom:1px solid rgba(0,212,255,.04);color:var(--text2)}
  tr:last-child td{border-bottom:none}tr:hover td{background:rgba(0,212,255,.03)}
  pre{background:rgba(5,11,24,.8);border:1px solid var(--border);border-radius:10px;padding:16px 18px;overflow-x:auto;font-family:var(--mono);font-size:.76rem;line-height:1.55;margin:12px 0;position:relative;cursor:pointer;transition:border-color .2s,box-shadow .2s}
  pre:hover{border-color:rgba(0,212,255,.2);box-shadow:var(--glow)}
  pre .lb{position:absolute;top:6px;right:11px;font-size:.55rem;color:var(--accent);font-family:var(--mono);opacity:.5;pointer-events:none;letter-spacing:.04em}
  pre .lb::before{content:'> '}
  pre:active{transform:scale(.995)}
  code{font-family:var(--mono);font-size:.8em;background:rgba(0,212,255,.06);padding:1px 5px;border-radius:3px;color:var(--accent)}
  pre code{background:none;padding:0;border-radius:0;color:#b8cde0;font-size:.76rem}
  .callout{border-radius:10px;padding:16px 20px;margin:16px 0;border-left:3px solid;font-size:.8rem;background:rgba(12,21,40,.4);backdrop-filter:blur(4px)}
  .callout-i{border-color:var(--accent);background:rgba(0,212,255,.04)}
  .callout-w{border-color:var(--yellow);background:rgba(245,158,11,.04)}
  .callout-d{border-color:var(--red);background:rgba(239,68,68,.04)}
  .callout-g{border-color:var(--green);background:rgba(34,197,94,.04)}
  .callout strong{display:block;margin-bottom:4px;font-size:.82rem;color:var(--text)}
  .pill{display:inline-block;padding:2px 10px;border-radius:8px;font-size:.65rem;font-weight:500}
  .p-c{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.15)}
  .p-h{background:rgba(245,158,11,.12);color:var(--yellow);border:1px solid rgba(245,158,11,.15)}
  .p-m{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.12)}
  .p-l{background:rgba(122,143,174,.1);color:var(--text2);border:1px solid rgba(122,143,174,.12)}
  .hl{background:rgba(245,158,11,.2);padding:0 3px;border-radius:3px}
  .accordion{border:1px solid var(--border);border-radius:10px;margin:10px 0;overflow:hidden;transition:box-shadow .2s}
  .accordion:hover{box-shadow:var(--glow)}
  .acc-hdr{padding:11px 16px;background:rgba(17,30,56,.5);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.82rem;font-weight:500;color:var(--text);user-select:none;transition:background .15s}
  .acc-hdr:hover{background:rgba(17,30,56,.8)}
  .acc-hdr .arrow{font-size:.6rem;transition:transform .2s;color:var(--accent);opacity:.6}
  .acc-hdr .arrow.open{transform:rotate(90deg)}
  .acc-body{display:none;padding:0}
  .acc-body.open{display:block}
  .acc-line{padding:5px 16px;font-size:.74rem;color:var(--text2);font-family:var(--mono);line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .acc-line:first-child{margin-top:14px;padding-top:6px;border-top:1px solid var(--border)}
  .acc-line:last-child{margin-bottom:14px}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:99}
  .overlay.open{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .mitre-matrix{display:flex;gap:8px;overflow-x:auto;padding:10px 0 16px;scrollbar-width:thin;position:relative}
  .mitre-matrix::after{content:'← Desplazá →';display:block;position:sticky;right:8px;bottom:0;font-size:.6rem;color:var(--accent);background:rgba(12,21,40,.85);backdrop-filter:blur(8px);padding:4px 12px;border-radius:6px;border:1px solid rgba(0,212,255,.2);white-space:nowrap;pointer-events:none;opacity:.7;align-self:flex-end;font-family:var(--mono)}
  .mitre-col{flex:0 0 165px;min-width:165px;background:rgba(17,30,56,.4);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
  .mitre-col:hover{border-color:rgba(0,212,255,.15)}
  .mitre-col-hdr{background:rgba(0,212,255,.04);padding:9px 10px;text-align:center;border-bottom:1px solid var(--border)}
  .mitre-col-hdr .mitre-ta{display:block;font-size:.65rem;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:.03em}
  .mitre-col-hdr .mitre-tn{display:block;font-size:.7rem;color:var(--text);font-weight:500;margin-top:3px}
  .mitre-techs{padding:4px 0;max-height:360px;overflow-y:auto}
  .mitre-tech,.mitre-sub{padding:6px 10px;border-bottom:1px solid rgba(0,212,255,.02);cursor:pointer;transition:background .12s}
  .mitre-tech:hover,.mitre-sub:hover{background:rgba(0,212,255,.06)}
  .mitre-tech .mitre-tid,.mitre-sub .mitre-tid{font-size:.58rem;font-weight:600;color:var(--yellow);font-family:var(--mono)}
  .mitre-tech .mitre-tname,.mitre-sub .mitre-tname{font-size:.63rem;color:var(--text);display:block;line-height:1.25;margin-top:2px}
  .mitre-tech .mitre-desc,.mitre-sub .mitre-desc{font-size:.58rem;color:var(--text2);display:block;line-height:1.3;margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .mitre-sub{padding-left:16px;background:rgba(0,0,0,.15)}
  .mitre-sub .mitre-tname{font-size:.6rem}
  .mitre-sub .mitre-desc{font-size:.56rem}
  .mitre-subs{border-top:1px solid var(--border);max-height:180px;overflow-y:auto}
</style>
</head>
<body><div id="root"></div>
<script>

"use strict";

const { useState, useRef, useEffect, useCallback, useMemo } = React;
const e = React.createElement;

// ===== DATA =====

// ===== COMPONENTS =====
function CodeBlock(props) {
  const [copied, setCopied] = React.useState(false);
  const text = props.lines.join('\n');
  function copy() {
    navigator.clipboard.writeText(text).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 1200);
    });
  }
  return e('pre',{onClick:copy,title:'Click para copiar'},
    e('span',{className:'lb'},copied ? '\u2713 Copiado' : props.lang),
    e('code',null,props.lines.map(function(l,i){
      return React.createElement(React.Fragment,{key:i},l,'\n');
    }))
  );
}

function Callout(props) {
  var s = {i:'callout-i',w:'callout-w',d:'callout-d',g:'callout-g'}[props.style] || 'callout-i';
  return e('div',{className:'callout '+s},
    e('strong',null,props.title),
    props.body
  );
}

function TableView(props) {
  return e('div',{className:'cw'},
    e('table',null,
      e('thead',null,e('tr',null,props.headers.map(function(h,i){return e('th',{key:i},h)}))),
      e('tbody',null,props.rows.map(function(r,ri){
        return e('tr',{key:ri},r.map(function(c,ci){return e('td',{key:ci},c)}))
      }))
    )
  );
}

function GridView(props) {
  return e('div',{className:'grid-2'},
    props.items.map(function(it,i){
      var tc = {b:'t-b',g:'t-g',y:'t-y',r:'t-r',p:'t-p',o:'t-o'}[it.c] || 't-b';
      return e('div',{className:'info-card',key:i},
        e('h4',null,it.i+' '+it.t),
        e('p',null,it.d),
        it.g ? e('div',{className:'tags'},e('span',{className:'tag '+tc},it.g)) : null
      );
    })
  );
}

function TabSwitcher(props) {
  var _useState = React.useState(0), active = _useState[0], setActive = _useState[1];
  return e('div',{className:'tabs'},
    e('div',{className:'tab-bar'},props.tabs.map(function(t,i){
      return e('button',{key:i,className:'tab-btn'+(i===active?' active':''),onClick:function(){setActive(i)}},t.label);
    })),
    e('div',{className:'tab-content'},props.tabs.map(function(t,i){
      return i===active ? e('div',{key:i,className:'tab-pane active'},e(CodeBlock,{lang:t.lang,lines:t.lines})) : null;
    }))
  );
}

function Accordion(props) {
  var _useState2 = React.useState(null), open = _useState2[0], setOpen = _useState2[1];
  return e('div',null,props.items.map(function(it,i){
    var isOpen = open === i;
    return e('div',{className:'accordion',key:i},
      e('div',{className:'acc-hdr',onClick:function(){setOpen(isOpen?null:i)}},
        it.title,
        e('span',{className:'arrow'+(isOpen?' open':'')},'\u25B6')
      ),
      e('div',{className:'acc-body'+(isOpen?' open':'')},
        it.lines.map(function(l,li){return e('div',{key:li,className:'acc-line'},l)})
      )
    );
  }));
}

function MitreTech(props) {
  var t = props.tech, isSub = props.isSub;
  var cls = isSub ? 'mitre-sub' : 'mitre-tech';
  var url = t.url || 'https://attack.mitre.org/techniques/'+t.id.replace('.','/');
  function openUrl(e) {
    e.stopPropagation();
    window.open(url, '_blank', 'noopener');
  }
  return e('div',{className:cls,onClick:openUrl,title:'Click para ver en MITRE ATT&CK'},
    e('span',{className:'mitre-tid'},t.id),
    e('span',{className:'mitre-tname'},t.name),
    t.desc ? e('span',{className:'mitre-desc'},t.desc) : null
  );
}

function MitreMatrix(props) {
  var tacs = props.tactics || [];
  return e('div',{className:'mitre-matrix'},
    tacs.map(function(t,i){
      var techs = t.techniques || [];
      var parents = techs.filter(function(x){return !x.is_sub});
      var subs = techs.filter(function(x){return x.is_sub});
      return e('div',{className:'mitre-col',key:i},
        e('div',{className:'mitre-col-hdr'},
          e('span',{className:'mitre-ta'},t.id),
          e('span',{className:'mitre-tn'},t.name)
        ),
        e('div',{className:'mitre-techs'},
          parents.map(function(pt,pi){
            return e(MitreTech,{key:'p'+pi,tech:pt,isSub:false});
          })
        ),
        subs.length > 0 ? e('div',{className:'mitre-subs'},
          subs.map(function(st,si){
            return e(MitreTech,{key:'s'+si,tech:st,isSub:true});
          })
        ) : null
      );
    })
  );
}

function renderContent(block, mitreMatrix) {
  switch(block.type) {
    case 'table': return e(TableView,{headers:block.h,rows:block.r});
    case 'grid': return e(GridView,{items:block.items});
    case 'code': return e(CodeBlock,{lang:block.lang,lines:block.lines});
    case 'callout': return e(Callout,{style:block.s,title:block.title,body:block.body});
    case 'tabs': return e(TabSwitcher,{tabs:block.tabs});
    case 'accordion': return e(Accordion,{items:block.items});
    case 'mitre': return e(MitreMatrix, {tactics: mitreMatrix});
    case 'sub': return e('div',{className:'subtitle'},block.title);
    default: return null;
  }
}

// ===== SECTION COMPONENT =====
function SectionCard(props) {
  var s = props.section, mitreMatrix = props.mitreMatrix;
  return e('div',{className:'section-card',id:s.id},
    e('div',{className:'section-hdr'},
      e('div',{className:'left'},
        e('span',{className:'icon'},s.icon),
