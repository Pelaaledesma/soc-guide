<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Guide</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0a0e14;
    --bg2:#0f131a;
    --bg3:#141a24;
    --bg4:#1a2230;
    --bd:rgba(255,255,255,.04);
    --text:#d4dce8;
    --text2:#5c6e8a;
    --cyan:#26c6da;
    --blue:#42a5f5;
    --green:#66bb6a;
    --yellow:#fdd835;
    --red:#ef5350;
    --purple:#ab47bc;
    --orange:#ffa726;
    --font:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono','Fira Code',monospace;
    --r:6px;
    --g1:#0a0e14; --g2:#10151e; --g3:#161c28; --g4:#1d2535
  }

  html{font-size:15px;scroll-behavior:smooth}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
  ::selection{background:rgba(38,198,218,.2);color:var(--text)}

  /* ===== LAYOUT ===== */
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}

  /* ===== HERO ===== */
  .hero{background:linear-gradient(180deg,rgba(10,14,20,.92) 0%,rgba(10,14,20,.7) 50%,rgba(15,19,26,.95) 100%),url('https://cybercrim.com/wp-content/uploads/2025/04/establishing_blue_team_soc.jpg') center/cover no-repeat;border-bottom:1px solid var(--bd);padding:64px 0 32px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(38,198,218,.3) 50%,transparent 100%)}
  .hero .wrap{position:relative}
  .hero-grid{display:flex;align-items:flex-start;justify-content:space-between;gap:24px}
  .hero-main{flex:1}
  .hero-ascii{font-family:var(--mono);font-size:.5rem;line-height:1.3;color:rgba(38,198,218,.12);white-space:pre;text-align:right;user-select:none;pointer-events:none;margin-top:-4px}
  .hero-title-wrap{display:flex;align-items:center;gap:16px}
  .hero-icon{flex-shrink:0;width:48px;height:48px}
  .hero-icon svg{width:100%;height:100%;display:block}
  .hero-title{font-family:var(--mono);font-size:2.4rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;background:linear-gradient(180deg,#fff 0%,var(--text) 60%,rgba(212,220,232,.5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-title .accent{color:var(--cyan);-webkit-text-fill-color:var(--cyan)}
  .hero-sub{font-size:.78rem;color:var(--text2);margin-top:6px;font-family:var(--mono)}
  .hero-sub .hl{color:var(--cyan)}
  .hero-meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
  .hero-meta-item{display:flex;align-items:center;gap:8px;font-size:.7rem;font-family:var(--mono);color:var(--text2)}
  .hero-meta-item .num{font-size:1.1rem;font-weight:700;color:var(--text)}
  .hero-meta-item .lab{text-transform:uppercase;font-size:.55rem;letter-spacing:.04em}
  .hero-meta-item .num.accent{color:var(--cyan)}
  .hero-meta-item .num.green{color:var(--green)}
  .hero-decor{position:absolute;right:0;top:-10px;opacity:.06;font-family:var(--mono);font-size:.45rem;line-height:1.2;white-space:pre;user-select:none;pointer-events:none}

  /* ===== FILTER TABS ===== */
  .filters{position:sticky;top:0;z-index:99;background:rgba(15,19,26,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);padding:0}
  .filters .wrap{display:flex;align-items:center;gap:4px;padding:8px 0;overflow-x:auto;flex-wrap:nowrap}
  .filters .wrap::-webkit-scrollbar{height:0}
  .f-search{display:flex;align-items:center;gap:6px;flex-shrink:0;padding:0 10px 0 4px;border:1px solid rgba(255,255,255,.06);border-radius:var(--r);background:rgba(255,255,255,.02);transition:all .15s;margin-right:6px}
  .f-search:focus-within{border-color:rgba(38,198,218,.3);background:rgba(38,198,218,.03)}
  .f-search svg{flex-shrink:0;opacity:.3}
  .f-search input{background:transparent;border:none;outline:none;padding:5px 0;font-size:.7rem;font-family:var(--mono);color:var(--text);width:120px;transition:width .2s}
  .f-search input::placeholder{color:var(--text2);opacity:.4}
  .f-search input:focus{width:180px}
  .f-search .clear{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.6rem;padding:2px 4px;opacity:0;transition:opacity .12s;font-family:var(--mono)}
  .f-search .clear.show{opacity:.5}
  .f-search .clear:hover{opacity:1}
  .f-search .g-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:.6rem;padding:2px 6px;opacity:0;transition:opacity .12s;font-family:var(--mono);text-decoration:none}
  .f-search .g-btn.show{opacity:.4}
  .f-search .g-btn:hover{opacity:.8;color:var(--cyan)}
  .f-search-divider{width:1px;height:18px;background:var(--bd);flex-shrink:0;margin:0 4px}
  .f-btn{padding:7px 16px;font-size:.7rem;font-family:var(--mono);font-weight:500;background:transparent;border:none;color:var(--text2);cursor:pointer;white-space:nowrap;border-radius:var(--r);transition:all .12s;flex-shrink:0}
  .f-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
  .f-btn.active{color:var(--cyan);background:rgba(38,198,218,.08)}
  .f-btn .cnt{font-size:.55rem;color:var(--text2);opacity:.5;margin-left:6px}

  /* ===== SECTIONS ===== */
  .sections{padding:24px 0 48px}

  /* external refs */
  .x-refs{margin-bottom:16px;padding:12px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r)}
  .x-refs-hdr{font-size:.6rem;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .x-refs-list{display:flex;flex-wrap:wrap;gap:6px}
  .x-refs-link{font-size:.7rem;font-family:var(--mono);padding:4px 10px;background:rgba(38,198,218,.04);border:1px solid rgba(38,198,218,.1);border-radius:4px;color:var(--cyan);text-decoration:none;transition:all .12s}
  .x-refs-link:hover{background:rgba(38,198,218,.08);border-color:rgba(38,198,218,.2)}
  .section{margin-bottom:24px;display:block}
  .section.hidden{display:none}
  .section-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--bg3);border:1px solid var(--bd);border-bottom:none;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;transition:background .12s}
  .section-hdr:hover{background:var(--bg4)}
  .section-hdr .icon{font-size:1.2rem;width:24px;text-align:center}
  .section-hdr h2{font-size:.95rem;font-weight:600;color:var(--text)}
  .section-hdr .cnt-badge{font-size:.6rem;padding:2px 10px;border-radius:10px;background:rgba(255,255,255,.04);color:var(--text2);font-family:var(--mono)}
  .section-hdr .toggle{font-size:.6rem;color:var(--text2);margin-left:auto;transition:transform .2s}
  .section-hdr .toggle.open{transform:rotate(180deg)}

  .section-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--r) var(--r);background:var(--bg2);overflow:hidden;transition:max-height .25s ease}
  .section-body.closed{max-height:0 !important;padding:0 !important;border:none}
  .section-body.open{max-height:50000px;padding:20px 20px 24px}

  /* ===== CONTENT BLOCKS ===== */
  .sub-title{font-size:.8rem;font-weight:600;color:var(--cyan);padding:14px 0 8px 12px;border-left:2px solid var(--cyan);margin:12px 0 8px;font-family:var(--mono);letter-spacing:.03em}

  /* callout */
  .callout{padding:12px 16px;margin:10px 0;border-radius:var(--r);font-size:.78rem;line-height:1.5;border-left:3px solid}
  .callout-i{background:rgba(66,165,245,.05);border-color:var(--blue);color:var(--text)}
  .callout-w{background:rgba(255,167,38,.05);border-color:var(--orange);color:var(--text)}
  .callout-d{background:rgba(239,83,80,.05);border-color:var(--red);color:var(--text)}
  .callout-g{background:rgba(102,187,106,.05);border-color:var(--green);color:var(--text)}
  .callout-title{font-weight:600;font-size:.82rem;margin-bottom:4px}

  /* table */
  .tbl-wrap{overflow-x:auto;margin:10px 0}
  table{width:100%;border-collapse:collapse;font-size:.75rem}
  thead{background:var(--bg3)}
  th{padding:8px 12px;text-align:left;font-weight:600;color:var(--text2);font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bd);white-space:nowrap}
  td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top;color:var(--text)}
  tbody tr:hover{background:rgba(255,255,255,.015)}

  /* pills/tags in tables */
  .pill{display:inline-block;padding:2px 10px;border-radius:4px;font-size:.65rem;font-weight:600;font-family:var(--mono)}
  .p-c{background:rgba(239,83,80,.15);color:var(--red)}
  .p-h{background:rgba(255,167,38,.15);color:var(--orange)}
  .p-m{background:rgba(255,216,53,.12);color:var(--yellow)}
  .p-l{background:rgba(92,110,138,.2);color:var(--text2)}
  .tag{display:inline-block;padding:2px 9px;border-radius:4px;font-size:.6rem;font-weight:500;font-family:var(--mono)}
  .t-r{background:rgba(239,83,80,.12);color:var(--red)}
  .t-o{background:rgba(255,167,38,.12);color:var(--orange)}
  .t-y{background:rgba(253,216,53,.1);color:var(--yellow)}
  .t-b{background:rgba(66,165,245,.1);color:var(--blue)}
  .t-g{background:rgba(102,187,106,.1);color:var(--green)}
  .t-p{background:rgba(171,71,188,.1);color:var(--purple)}

  /* code blocks */
  .code-block{margin:10px 0;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
  .code-hdr{display:flex;align-items:center;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--bd);font-size:.65rem;font-family:var(--mono);color:var(--text2);gap:8px}
  .code-hdr .lang{font-weight:600;color:var(--cyan);text-transform:uppercase}
  .code-hdr .copy-btn{margin-left:auto;background:transparent;border:1px solid var(--bd);color:var(--text2);cursor:pointer;padding:3px 10px;border-radius:4px;font-size:.58rem;font-family:var(--mono);transition:all .12s}
  .code-hdr .copy-btn:hover{background:rgba(255,255,255,.04);color:var(--text);border-color:rgba(255,255,255,.1)}
  .code-body{padding:12px 16px;overflow-x:auto}
  .code-body code{font-family:var(--mono);font-size:.72rem;line-height:1.55;color:var(--text);white-space:pre}
  .code-body .cm{color:var(--text2);opacity:.5}
  .code-body .kw{color:var(--purple)}
  .code-body .fn{color:var(--cyan)}
  .code-body .str{color:var(--green)}
  .code-body .num{color:var(--orange)}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin:10px 0}
  .g-card{padding:12px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r)}
  .g-card h4{font-size:.8rem;font-weight:600;margin-bottom:4px;color:var(--text)}
  .g-card p{font-size:.72rem;color:var(--text2);line-height:1.4}
  .g-card .g-tag{display:inline-block;margin-top:6px;padding:2px 9px;border-radius:4px;font-size:.58rem;font-weight:500;font-family:var(--mono)}

  /* accordion */
  .accordion{border:1px solid var(--bd);border-radius:var(--r);margin:8px 0;overflow:hidden}
  .acc-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);cursor:pointer;font-size:.8rem;font-weight:500;transition:background .12s}
  .acc-hdr:hover{background:var(--bg4)}
  .acc-hdr .arr{margin-left:auto;font-size:.55rem;color:var(--text2);transition:transform .2s}
  .acc-hdr .arr.open{transform:rotate(90deg)}
  .acc-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .2s ease}
  .acc-body.open{max-height:5000px;padding:10px 14px}
  .acc-line{font-size:.72rem;padding:3px 0;color:var(--text2);font-family:var(--mono)}

  /* mitre */
  .mitre-wrap{overflow-x:auto;margin:10px 0}
  .mitre-row{display:flex;gap:4px;min-width:max-content;padding:3px 0}
  .mitre-cell{min-width:160px;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;cursor:pointer;transition:all .12s}
  .mitre-cell:hover{border-color:var(--cyan);background:rgba(38,198,218,.04)}
  .mitre-cell .tid{font-size:.6rem;font-family:var(--mono);color:var(--cyan);display:block}
  .mitre-cell .tname{font-size:.65rem;color:var(--text);display:block;margin-top:2px}
  .mitre-cell .tdesc{font-size:.58rem;color:var(--text2);display:block;margin-top:3px}
  .mitre-cell.tac-hdr{background:var(--bg4);min-width:130px;cursor:default}
  .mitre-cell.tac-hdr .tname{font-size:.65rem;font-weight:600;color:var(--yellow)}

  /* tooltip */
  .copy-tip{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);color:var(--green);padding:10px 24px;border-radius:var(--r);font-size:.72rem;font-family:var(--mono);border:1px solid rgba(102,187,106,.2);z-index:999;pointer-events:none;animation:fadeUp .3s ease forwards}
  @keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  /* ===== RESPONSIVE ===== */
  @media(max-width:700px){
    .wrap{padding:0 14px}
    .hero{padding:40px 0 24px}
    .hero-title{font-size:1.6rem}
    .hero-icon{width:36px;height:36px}
    .hero-ascii{display:none}
    .hero-meta{gap:12px}
    .hero-meta-item{font-size:.6rem}
    .hero-meta-item .num{font-size:.95rem}
    .filters .wrap{gap:0;padding:6px 0}
    .f-search input{width:80px;font-size:.62rem}
    .f-search input:focus{width:120px}
    .f-search-divider{display:none}
    .f-btn{padding:5px 12px;font-size:.65rem}
    .section-hdr{padding:12px 14px}
    .section-body.open{padding:14px 14px 18px}
    .grid{grid-template-columns:1fr}
    td,th{padding:5px 8px;font-size:.68rem}
    .code-body{padding:10px 12px;font-size:.65rem}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
var e = React.createElement;

// ===== COPY UTILITY =====
var CopiedTip = null;
function showCopied() {
  if (CopiedTip) return;
  CopiedTip = document.createElement('div');
  CopiedTip.className = 'copy-tip';
  CopiedTip.textContent = '✓ Copiado';
  document.body.appendChild(CopiedTip);
  setTimeout(function(){CopiedTip.remove();CopiedTip=null},1200);
}

function copyText(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(showCopied).catch(function(){})}
}

// ===== COMPONENTS =====
function CodeBlock(p){
  var lines = p.lines || [];
  var txt = lines.join('\n');

  function renderLine(l){
    return l
      .replace(/<span class="cm">(.*?)<\/span>/g,'\x00CM$1\x01')
      .replace(/<span class="kw">(.*?)<\/span>/g,'\x00KW$1\x01')
      .replace(/<span class="fn">(.*?)<\/span>/g,'\x00FN$1\x01')
      .replace(/<span class="str">(.*?)<\/span>/g,'\x00ST$1\x01')
      .replace(/<span class="num">(.*?)<\/span>/g,'\x00NU$1\x01');
  }

  var html = lines.map(function(l){return '<span class="cm"># </span>'+renderLine(l)}).join('\n');

  return e('div',{className:'code-block'},
    e('div',{className:'code-hdr'},
      e('span',{className:'lang'},p.lang||'shell'),
      e('button',{className:'copy-btn',onClick:function(){copyText(txt)}},'⎘ copiar')
    ),
    e('div',{className:'code-body'},
      e('code',{dangerouslySetInnerHTML:{__html:html}})
    )
  );
}

function Callout(p){
  var cls = 'callout callout-'+p.s;
  return e('div',{className:cls},
    e('div',{className:'callout-title'},p.title),
    e('div',null,p.body)
  );
}

function TableView(p){
  return e('div',{className:'tbl-wrap'},
    e('table',null,
      e('thead',null,e('tr',null,p.h.map(function(h,i){return e('th',{key:i},h)}))),
      e('tbody',null,p.r.map(function(r,ri){
        return e('tr',{key:ri},r.map(function(c,ci){return e('td',{key:ci},
          typeof c==='string'&&c.includes('</span>')?e('span',{dangerouslySetInnerHTML:{__html:c}}):c
        )}))
      }))
    )
  );
}

function GridView(p){
  return e('div',{className:'grid'},
    p.items.map(function(it,i){
      var tc = {b:'t-b',g:'t-g',y:'t-y',r:'t-r',p:'t-p',o:'t-o'}[it.c]||'t-b';
      return e('div',{className:'g-card',key:i},
        e('h4',null,(it.i||'')+' '+it.t),
        e('p',null,it.d||it.body),
        it.g?e('span',{className:'g-tag '+tc},it.g):null
      );
    })
  );
}

function TabSwitcher(p){
  var _a=React.useState(0),active=_a[0],setActive=_a[1];
  return e('div',null,
    e('div',{style:{display:'flex',gap:4,margin:'10px 0',flexWrap:'wrap'}},
      p.tabs.map(function(t,i){return e('button',{key:i,
        style:{padding:'6px 14px',fontSize:'.7rem',fontFamily:'var(--mono)',background:i===active?'rgba(38,198,218,.1)':'var(--bg3)',border:'1px solid var(--bd)',color:i===active?'var(--cyan)':'var(--text2)',cursor:'pointer',borderRadius:'4px'},
        onClick:function(){setActive(i)}},t.label)})
    ),
    p.tabs.map(function(t,i){return i===active?
      e('div',{key:i},e(CodeBlock,{lang:t.lang,lines:t.lines})):null})
  );
}

function Accordion(p){
  var _a2=React.useState(null),open=_a2[0],setOpen=_a2[1];
  return e('div',null,p.items.map(function(it,i){
    var isO=open===i;
    return e('div',{className:'accordion',key:i},
      e('div',{className:'acc-hdr',onClick:function(){setOpen(isO?null:i)}},
        it.title,
        e('span',{className:'arr'+(isO?' open':'')},'\u25B6')
      ),
      e('div',{className:'acc-body'+(isO?' open':'')},
        it.lines.map(function(l,li){return e('div',{className:'acc-line',key:li},l)})
      )
    );
  }));
}

function MitreTech(p){
  var t=p.tech;
  var url=t.url||'https://attack.mitre.org/techniques/'+t.id.replace('.','/');
  function openUrl(e2){e2.stopPropagation();window.open(url,'_blank','noopener')}
  return e('div',{className:'mitre-cell',onClick:openUrl,title:'Ver en MITRE ATT&CK'},
    e('span',{className:'tid'},t.id),
    e('span',{className:'tname'},t.name),
    t.desc?e('span',{className:'tdesc'},t.desc):null
  );
}

function MitreMatrix(p){
  var tacs=p.tactics||[];
  return e('div',{className:'mitre-wrap'},
    tacs.map(function(t,i){
      var techs=t.techniques||[];
      var all=[];
      techs.forEach(function(x){
        if(!x.is_sub) all.push(x);
      });
      return e('div',{className:'mitre-row',key:i},
        e('div',{className:'mitre-cell tac-hdr'},
          e('span',{className:'tid'},t.id),
          e('span',{className:'tname'},t.name)
        ),
        all.map(function(pt,pi){return e(MitreTech,{key:pi,tech:pt})})
      );
    })
  );
}

// ===== FILTER GROUPS =====
var FILTERS = [
  {id:'all',label:'ALL',sections:[]},
  {id:'triage',label:'TRIAGE',sections:['triage','severidad']},
  {id:'windows',label:'WINDOWS',sections:['evtx','sysmon','win-cmd','lolbins']},
  {id:'linux',label:'LINUX',sections:['linux-cmd','linux-logs']},
  {id:'network',label:'NETWORK',sections:['network','queries']},
  {id:'playbooks',label:'PLAYBOOKS',sections:['containment','playbooks']},
  {id:'mitre',label:'MITRE',sections:['mitre']},
  {id:'tools',label:'TOOLS',sections:['forensics','malware','tools','cheat']}
];

// ===== EXTERNAL REFERENCES =====
var EXTERNAL_LINKS = [
  {q:'4624',url:'https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4624',label:'Event 4624 (Microsoft)'},

function findExternalRefs(query){
  if(!query||query.length<2)return[];
  var q=query.toLowerCase();
  return EXTERNAL_LINKS.filter(function(r){
    return q.indexOf(r.q)>=0||r.q.indexOf(q)>=0;
  }).slice(0,6);
}

// ===== RENDER CONTENT =====
function renderBlock(block,mitreMatrix){
  switch(block.type){
    case 'table': return e(TableView,{h:block.h,r:block.r});
    case 'grid': return e(GridView,{items:block.items});
    case 'code': return e(CodeBlock,{lang:block.lang,lines:block.lines});
    case 'callout': return e(Callout,{s:block.s,title:block.title,body:block.body});
    case 'tabs': return e(TabSwitcher,{tabs:block.tabs});
    case 'accordion': return e(Accordion,{items:block.items});
    case 'mitre': return e(MitreMatrix,{tactics:mitreMatrix});
    case 'sub': return e('div',{className:'sub-title'},block.title);
    default: return null;
  }
}

// ===== SECTION CARD =====
function SectionCard(p){
  var s=p.section, mm=p.mitreMatrix;
  var _a=React.useState(true),open=_a[0],setOpen=_a[1];
  var totalBl=s.content?blCount(s.content):0;
  return e('div',{className:'section',id:s.id},
    e('div',{className:'section-hdr',onClick:function(){setOpen(!open)}},
      e('span',{className:'icon'},s.icon),
      e('h2',null,s.title),
      e('span',{className:'cnt-badge'},totalBl+' bloques'),
      e('span',{className:'toggle'+(open?' open':'')},'\u25BC')
    ),
    e('div',{className:'section-body'+(open?' open':' closed')},
      s.desc?e('div',{style:{fontSize:'.78rem',color:'var(--text2)',marginBottom:'12px',lineHeight:'1.5'}},s.desc):null,
      s.content?s.content.map(function(b,i){return e(React.Fragment,{key:i},renderBlock(b,mm))}):null
    )
  );
}

function blCount(content){
  var n=0;
  content.forEach(function(b){
    if(b.type==='table')n+=b.r.length;
    else if(b.type==='grid')n+=b.items.length;
    else if(b.type==='code')n++;
    else if(b.type==='callout')n++;
    else if(b.type==='sub')n++;
    else n++;
  });
  return n;
}

// ===== APP =====
function App(){
  var _a=React.useState(null),data=_a[0],setData=_a[1];
  var _b=React.useState(true),loading=_b[0],setLoading=_b[1];
  var _c=React.useState(null),err=_c[0],setErr=_c[1];
  var _d=React.useState('all'),filter=_d[0],setFilter=_d[1];
  var _e=React.useState(''),search=_e[0],setSearch=_e[1];

  React.useEffect(function(){
    fetch('data/sections.json')
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
      .then(function(d){setData(d);setLoading(false)})
      .catch(function(e2){setErr(e2.message);setLoading(false)});
  },[]);

  var sections=data&&data.sections?data.sections:[];
  var mitreMatrix=data&&data.mitreMatrix?data.mitreMatrix:[];

  function textMatches(txt,q){
    if(!q||!txt)return false;
    return txt.toLowerCase().indexOf(q.toLowerCase())>=0;
  }

  function blockMatches(b,q){
    if(!b||!q)return false;
    switch(b.type){
      case 'table': return b.h.some(function(h){return textMatches(h,q)})||b.r.some(function(r){return r.some(function(c){return textMatches(typeof c==='string'?c:'',q)})});
      case 'code': return b.lines.some(function(l){return textMatches(l,q)});
      case 'callout': return textMatches(b.title,q)||textMatches(b.body,q);
      case 'grid': return b.items.some(function(it){return textMatches(it.t,q)||textMatches(it.d,q)||textMatches(it.g,q)});
      case 'accordion': return b.items.some(function(it){return textMatches(it.title,q)||it.lines.some(function(l){return textMatches(l,q)})});
      case 'tabs': return b.tabs.some(function(t){return textMatches(t.label,q)||t.lines.some(function(l){return textMatches(l,q)})});
      case 'sub': return textMatches(b.title,q);
      default: return false;
    }
  }

  var filteredSections=React.useMemo(function(){
    var sq=search.trim();
    var byFilter=filter==='all'?sections:function(){
      var f=FILTERS.find(function(x){return x.id===filter});
      return f?sections.filter(function(s){return f.sections.indexOf(s.id)>=0}):sections;
    }();
    if(!sq)return byFilter;
    return byFilter.filter(function(s){
      if(textMatches(s.title,sq)||textMatches(s.desc,sq))return true;
      return s.content&&s.content.some(function(b){return blockMatches(b,sq)});
    });
  },[filter,sections,search]);

  // loading
  if(loading)return e('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:18,background:'var(--bg)'}},
    e('div',{style:{width:28,height:28,border:'2px solid rgba(255,255,255,.04)',borderTopColor:'var(--cyan)',borderRadius:'50%',animation:'spin 1s linear infinite'}}),
    e('p',{style:{fontSize:'.8rem',fontFamily:'var(--mono)',color:'var(--text2)',opacity:.5}},'Cargando...')
  );
  if(err)return e('div',{style:{padding:60,textAlign:'center',color:'var(--red)'}},
    e('h2',{style:{fontSize:'1.2rem'}},'Error'),e('p',{style:{color:'var(--text2)',marginTop:10,fontSize:'.9rem'}},err)
  );
  if(!data)return null;

  return [
    // HERO
    e('header',{className:'hero',key:'hero'},
      e('div',{className:'wrap'},
        e('div',{className:'hero-grid'},
          e('div',{className:'hero-main'},
            e('div',{className:'hero-title-wrap'},
              e('div',{className:'hero-icon',dangerouslySetInnerHTML:{__html:HERO_ICON}}),
              e('div',{className:'hero-title'},'SOC Guide')
            ),
            e('div',{className:'hero-sub'},'Guía de referencia para operaciones ',e('span',{className:'hl'},'SOC')),
            e('div',{className:'hero-meta'},
              e('div',{className:'hero-meta-item'},
                e('span',{className:'num accent'},sections.length),
                e('span',{className:'lab'},'Secciones')
              ),
              e('div',{className:'hero-meta-item'},
                e('span',{className:'num green'},mitreMatrix.length||0),
                e('span',{className:'lab'},'Tactics MITRE')
              ),
              e('div',{className:'hero-meta-item'},
                e('span',{className:'num'},sections.reduce(function(a,s){return a+(s.content?s.content.length:0)},0)),
                e('span',{className:'lab'},'Bloques')
              )
            )
          ),
          e('div',{className:'hero-ascii'},
            '╭──────────────────────╮\n',
            '│  ⚡ SOC ANALYST KIT  │\n',
            '╰──────────────────────╯\n',
            ' ── SOC Guide v1 ──'
          )
        )
      )
    ),
    // FILTERS
    e('div',{className:'filters',key:'filters'},
      e('div',{className:'wrap'},
        e('div',{className:'f-search'},
          e('svg',{width:'14',height:'14',viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2'},e('circle',{cx:'11',cy:'11',r:'8'}),e('path',{d:'M21 21l-4.35-4.35'})),
          e('input',{type:'text',placeholder:'Buscar...',value:search,onChange:function(e2){setSearch(e2.target.value)},onKeyDown:function(e2){if(e2.key==='Escape'){setSearch('')}}}),
          e('button',{className:'clear'+(search?' show':''),onClick:function(){setSearch('')}},'x'),
          search?e('a',{className:'g-btn show',href:'https://www.google.com/search?q=SOC+'+encodeURIComponent(search),target:'_blank',rel:'noopener',title:'Buscar en Google'},'G'):null
        ),
        e('span',{className:'f-search-divider'}),
        FILTERS.map(function(f){
          var c = f.id==='all' ? sections.length : sections.filter(function(s){return f.sections.indexOf(s.id)>=0}).length;
          return e('button',{key:f.id,className:'f-btn'+(filter===f.id?' active':''),onClick:function(){setFilter(f.id)}},
            f.label,
            e('span',{className:'cnt'},c)
          );
        })
      )
    ),
    // CONTENT
    e('div',{className:'sections',key:'content'},
      e('div',{className:'wrap'},
        search?function(){
          var refs=findExternalRefs(search);
          return refs.length?e('div',{className:'x-refs'},
            e('div',{className:'x-refs-hdr'},'📎 Referencias externas'),
            e('div',{className:'x-refs-list'},refs.map(function(r,i){return e('a',{key:i,className:'x-refs-link',href:r.url,target:'_blank',rel:'noopener'},r.label)}))
          ):null;
        }():null,
        filteredSections.map(function(s){
          return e(SectionCard,{key:s.id,section:s,mitreMatrix:mitreMatrix});
        }),
        filteredSections.length===0?
          e('div',{style:{textAlign:'center',padding:'60px 20px',color:'var(--text2)'}},
            e('div',{style:{fontSize:'1.2rem',marginBottom:'6px',opacity:.3}},'🔍'),
            e('div',{style:{fontSize:'.85rem',marginBottom:'4px'}},search?'No hay resultados para "'+search+'"':'No hay secciones para este filtro.'),
            e('div',{style:{fontSize:'.7rem',fontFamily:'var(--mono)',opacity:.5}},search?'Probá con otros términos o limpiá la búsqueda':'Probá con otro filtro')
          )
          :null,
        e('div',{style:{textAlign:'center',fontSize:'.55rem',color:'var(--text2)',opacity:.2,padding:'24px 0 10px',fontFamily:'var(--mono)'}},'// soc-guide')
      )
    )
  ];
}

var root=document.getElementById('root');
try{ReactDOM.createRoot(root).render(e(App))}catch(ex){
  root.innerHTML='<div style="padding:40px;background:#080c14;color:#ef5350;font-family:monospace;min-height:100vh">'+
    '<h2>⚠ Error: '+ex.message+'</h2><pre style="color:#8b9db0;margin-top:12px">'+ex.stack+'</pre></div>';
}
</script>
